<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>英単語テスト（GRE・TOEFL）</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#f2f2f7;min-height:100vh;}
#nav{display:flex;background:#fff;border-bottom:1px solid #e5e5ea;position:sticky;top:0;z-index:10;}
.nav-btn{flex:1;padding:12px 4px;border:none;background:none;font-size:13px;color:#8e8e93;cursor:pointer;border-bottom:2px solid transparent;}
.nav-btn.active{color:#007aff;border-bottom:2px solid #007aff;font-weight:600;}
.screen{display:none;padding:16px 14px 40px;max-width:480px;margin:0 auto;}
.screen.active{display:block;}
#home-title{font-size:22px;font-weight:700;text-align:center;color:#1c1c1e;margin:16px 0 4px;}
#home-sub{font-size:13px;color:#8e8e93;text-align:center;margin-bottom:20px;}
.mode-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.mode-card-title{font-size:16px;font-weight:600;color:#1c1c1e;margin-bottom:4px;}
.mode-card-desc{font-size:13px;color:#8e8e93;margin-bottom:12px;}
.mode-card-count{font-size:12px;font-weight:500;color:#007aff;margin-bottom:12px;}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.filter-chip{padding:6px 12px;border:1.5px solid #e5e5ea;border-radius:20px;font-size:13px;color:#8e8e93;background:#fff;cursor:pointer;white-space:nowrap;}
.filter-chip.selected{border-color:#007aff;color:#007aff;background:#eff6ff;font-weight:500;}
.start-btn{display:block;width:100%;padding:14px;background:#007aff;border:none;border-radius:13px;font-size:16px;font-weight:600;color:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.start-btn:disabled{background:#c7c7cc;cursor:default;}
#list-controls{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap;}
#list-mode-chips{display:flex;gap:6px;margin-bottom:10px;width:100%;flex-wrap:wrap;}
#search{flex:1;min-width:140px;padding:10px 14px;border:1px solid #e5e5ea;border-radius:10px;font-size:15px;background:#fff;}
#sort-select{padding:10px 8px;border:1px solid #e5e5ea;border-radius:10px;font-size:13px;background:#fff;color:#1c1c1e;}
.wi{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px;position:relative;}
.wi .ww{font-size:16px;font-weight:600;color:#1c1c1e;padding-right:72px;}
.wi .wm{font-size:13px;color:#8e8e93;margin-top:2px;}
.wi .we{font-size:12px;color:#007aff;margin-top:6px;display:none;line-height:1.6;}
.wi.open .we{display:block;}
.wb{position:absolute;top:12px;right:12px;font-size:11px;font-weight:600;padding:3px 7px;border-radius:20px;white-space:nowrap;}
.b-hot{background:#fee2e2;color:#dc2626;}
.b-ok{background:#d1fae5;color:#065f46;}
.b-mid{background:#fef3c7;color:#92400e;}
.b-new{background:#f1f5f9;color:#64748b;}
#bar-wrap{background:#e5e5ea;border-radius:4px;height:5px;margin-bottom:5px;}
#bar{height:5px;background:#34c759;border-radius:4px;width:0%;transition:width .3s;}
#sc-lbl{font-size:12px;color:#8e8e93;text-align:right;margin-bottom:16px;}
#q-card{background:#fff;border-radius:16px;padding:28px 20px 20px;margin-bottom:14px;text-align:center;}
#word{font-size:30px;font-weight:700;color:#1c1c1e;margin-bottom:6px;word-break:break-word;line-height:1.2;}
#q-prog{font-size:13px;color:#8e8e93;}
#reveal-btn{display:block;width:100%;padding:15px;background:#f2f2f7;border:1.5px dashed #c7c7cc;border-radius:13px;font-size:15px;color:#8e8e93;cursor:pointer;margin-bottom:10px;-webkit-tap-highlight-color:transparent;}
#choices-wrap{display:none;}
.cb{display:block;width:100%;text-align:left;background:#fff;border:1.5px solid #e5e5ea;border-radius:13px;padding:14px 15px;margin-bottom:10px;font-size:16px;color:#1c1c1e;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.cb.ok{background:#d1fae5;border-color:#34c759;color:#065f46;}
.cb.ng{background:#fee2e2;border-color:#ff3b30;color:#7f1d1d;}
.cb.show{background:#d1fae5;border-color:#34c759;color:#065f46;}
#fb{font-size:16px;font-weight:600;text-align:center;min-height:22px;margin:6px 0 6px;}
#etym-box{background:#fff;border-radius:13px;padding:14px 16px;margin-bottom:10px;display:none;}
#etym-box .lbl{font-size:11px;font-weight:600;color:#007aff;margin-bottom:4px;}
#etym-box .txt{font-size:14px;color:#3a3a3c;line-height:1.6;}
#nxt-btn{display:none;width:100%;padding:15px;background:#007aff;border:none;border-radius:13px;font-size:16px;font-weight:600;color:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent;}
#result-wrap{display:none;text-align:center;padding:30px 0;}
.r-emoji{font-size:48px;margin-bottom:12px;}
#result-wrap h2{font-size:24px;font-weight:700;margin-bottom:8px;color:#1c1c1e;}
.r-msg{font-size:15px;color:#ff9500;font-weight:500;margin-bottom:8px;}
#result-wrap p{font-size:16px;color:#8e8e93;margin-bottom:28px;}
.r-btn{display:block;width:100%;padding:15px;border:none;border-radius:13px;font-size:16px;font-weight:600;cursor:pointer;margin-bottom:12px;-webkit-tap-highlight-color:transparent;}
.no-meaning-note{background:#fff3cd;color:#856404;font-size:12px;padding:8px 12px;border-radius:8px;margin-top:8px;}
</style>
</head>
<body>
<div id="nav">
  <button class="nav-btn active" onclick="showTab('home')">ホーム</button>
  <button class="nav-btn" onclick="showTab('quiz')">クイズ</button>
  <button class="nav-btn" onclick="showTab('list')">単語リスト</button>
</div>

<div id="home" class="screen active">
  <div id="home-title">英単語テスト</div>
  <div id="home-sub">GRE・TOEFL対応</div>

  <div class="mode-card">
    <div class="mode-card-title">試験モード</div>
    <div class="mode-card-desc">どの単語セットから出題するか</div>
    <div class="filter-row" id="exam-chips">
      <button class="filter-chip selected" data-exam="all" onclick="toggleChip(this,'exam')">すべて</button>
      <button class="filter-chip" data-exam="gre" onclick="toggleChip(this,'exam')">GRE</button>
      <button class="filter-chip" data-exam="toefl1" onclick="toggleChip(this,'exam')">TOEFL頻出</button>
      <button class="filter-chip" data-exam="toefl2" onclick="toggleChip(this,'exam')">TOEFL S/W</button>
    </div>

    <div class="mode-card-title" style="margin-top:14px;">出題形式</div>
    <div class="mode-card-desc">英単語→和訳 / 和訳→英単語</div>
    <div class="filter-row" id="dir-chips">
      <button class="filter-chip selected" data-dir="en2ja" onclick="toggleChip(this,'dir')">英→日</button>
      <button class="filter-chip" data-dir="ja2en" onclick="toggleChip(this,'dir')">日→英</button>
    </div>

    <div class="mode-card-title" style="margin-top:14px;">学習状況</div>
    <div class="filter-row" id="status-chips">
      <button class="filter-chip selected" data-status="all" onclick="toggleChip(this,'status')">すべて</button>
      <button class="filter-chip" data-status="new" onclick="toggleChip(this,'status')">未挑戦のみ</button>
      <button class="filter-chip" data-status="tried" onclick="toggleChip(this,'status')">取組済みのみ</button>
      <button class="filter-chip" data-status="wrong" onclick="toggleChip(this,'status')">間違えた単語</button>
    </div>

    <div class="mode-card-title" style="margin-top:12px;">苦手度フィルター</div>
    <div class="mode-card-desc">正答率で絞り込み（取組済みのみ有効）</div>
    <div class="filter-row" id="acc-chips">
      <button class="filter-chip selected" data-acc="all" onclick="toggleChip(this,'acc')">すべて</button>
      <button class="filter-chip" data-acc="weak" onclick="toggleChip(this,'acc')">苦手（〜49%）</button>
      <button class="filter-chip" data-acc="mid" onclick="toggleChip(this,'acc')">普通（50〜79%）</button>
      <button class="filter-chip" data-acc="good" onclick="toggleChip(this,'acc')">得意（80%〜）</button>
    </div>

    <div class="mode-card-title" style="margin-top:12px;">問題数</div>
    <div class="filter-row" id="count-chips">
      <button class="filter-chip" data-count="10" onclick="toggleChip(this,'count')">10問</button>
      <button class="filter-chip selected" data-count="20" onclick="toggleChip(this,'count')">20問</button>
      <button class="filter-chip" data-count="30" onclick="toggleChip(this,'count')">30問</button>
      <button class="filter-chip" data-count="50" onclick="toggleChip(this,'count')">50問</button>
    </div>

    <div class="mode-card-count" id="pool-count">対象: -語</div>
    <button class="start-btn" id="start-btn" onclick="startFiltered()">このモードで始める</button>
  </div>
</div>

<div id="quiz" class="screen">
  <div id="bar-wrap"><div id="bar"></div></div>
  <div id="sc-lbl">0 / 0</div>
  <div id="q-card">
    <div id="word"></div>
    <div id="q-prog"></div>
  </div>
  <button id="reveal-btn" onclick="revealChoices()">タップして選択肢を表示</button>
  <div id="choices-wrap">
    <div id="choices"></div>
    <div id="fb"></div>
    <div id="etym-box">
      <div class="lbl">語源・覚え方</div>
      <div class="txt" id="etym-text"></div>
    </div>
    <button id="nxt-btn" onclick="nextQ()">次の問題 →</button>
  </div>
  <div id="result-wrap">
    <div class="r-emoji" id="r-emoji"></div>
    <h2 id="r-title"></h2>
    <div class="r-msg">お疲れ様！次も頑張ろう！</div>
    <p id="r-sub"></p>
    <button class="r-btn" style="background:#007aff;color:#fff" onclick="showTab('home')">モード選択に戻る</button>
    <button class="r-btn" id="r-retry-btn" style="background:#34c759;color:#fff" onclick="retryMode()">同じ条件でもう一度</button>
    <button class="r-btn" id="r-wrong-btn" style="background:#ff9500;color:#fff;display:none" onclick="startWrongOnly()">間違えた単語を復習</button>
  </div>
</div>

<div id="list" class="screen">
  <div id="list-mode-chips">
    <button class="filter-chip selected" data-listexam="all" onclick="toggleListExam(this)">すべて</button>
    <button class="filter-chip" data-listexam="gre" onclick="toggleListExam(this)">GRE</button>
    <button class="filter-chip" data-listexam="toefl1" onclick="toggleListExam(this)">TOEFL頻出</button>
    <button class="filter-chip" data-listexam="toefl2" onclick="toggleListExam(this)">TOEFL S/W</button>
  </div>
  <div id="list-controls">
    <input id="search" type="search" placeholder="単語を検索..." oninput="filterList()">
    <select id="sort-select" onchange="filterList()">
      <option value="alpha">A-Z順</option>
      <option value="attempts_desc">取組回数↓</option>
      <option value="accuracy_asc">正答率↓</option>
      <option value="accuracy_desc">正答率↑</option>
      <option value="score_asc">苦手順</option>
    </select>
  </div>
  <div id="word-list"></div>
</div>

<script>
// ===== データ =====
var GRE_WORDS=[{"word":"aberrant","meaning":"通常から逸脱した・異常な","etymology":"ab（離れる）+ errare（迷う）→道から迷い離れる。errorと同語根"},{"word":"abeyance","meaning":"一時停止・保留状態","etymology":"ab（離れる）+ beance（開口）→口を閉ざして待機中。\"in abeyance\"の形で頻出"},{"word":"abstemious","meaning":"節制する・飲食を慎む","etymology":"abs（離れる）+ temetum（強い酒）→酒から離れる→節制する"},{"word":"aesthetic","meaning":"美的な・審美的な","etymology":"aisthesis（感覚）→感覚で美を捉える。anesthetic（麻酔）と同語根"},{"word":"alacrity","meaning":"快活さ・敏速さ・喜んで行う気持ち","etymology":"alacer（活発な）→「アラクリティ」→alacrity=a+lively→生き生きとした敏速さ"},{"word":"alleviate","meaning":"軽減する・和らげる","etymology":"al + levis（軽い）→重荷を軽くする。elevator（昇降機）と同語根"},{"word":"amalgamate","meaning":"合併する・混合する","etymology":"amalgama（合金）→異なる金属を溶かして合わせる"},{"word":"ambiguous","meaning":"曖昧な・多義的な","etymology":"ambi（両方）+ agere（動く）→両方向に動ける→どちらとも取れる"},{"word":"ambivalence","meaning":"相反する感情・両価性","etymology":"ambi（両方）+ valere（価値）→両方向に価値が引っ張る状態"},{"word":"ameliorate","meaning":"改善する・緩和する","etymology":"melior（より良い）→フランス語améliorer（改善する）と同語根"},{"word":"anachronism","meaning":"時代錯誤・時代遅れなもの","etymology":"ana（逆）+ chronos（時間）→時間の流れに逆行"},{"word":"analogous","meaning":"類似した・類推による","etymology":"ana（に従って）+ logos（理屈）→同じ理屈が当てはまる"},{"word":"anarchy","meaning":"無政府状態・混乱","etymology":"an（否定）+ arche（支配）→支配のない状態"},{"word":"anomalous","meaning":"異常な・変則的な","etymology":"an（否定）+ homos（同じ）→同じでない→異常な"},{"word":"antipathy","meaning":"反感・嫌悪","etymology":"anti（反対）+ pathos（感情）→反対の感情→反感"},{"word":"apathy","meaning":"無関心・無気力","etymology":"a（否定）+ pathos（感情）→感情がない状態"},{"word":"apprise","meaning":"知らせる・通知する","etymology":"ap + priser（価値をつける）→価値を知らせる→通知する"},{"word":"approbation","meaning":"承認・賛成・称賛","etymology":"ap + probare（試す）→試して良いと認める→承認"},{"word":"appropriate","meaning":"流用する・横領する","etymology":"ap + proprius（自分の）→自分のものにする→横領する"},{"word":"arcane","meaning":"秘密の・難解な・神秘的な","etymology":"arcanus（箱に閉じた）→箱の中に隠された秘密"},{"word":"arduous","meaning":"困難な・骨の折れる","etymology":"arduus（険しい）→険しい山道のように骨が折れる"},{"word":"artless","meaning":"素朴な・無邪気な・不器用な","etymology":"art（技巧）+ less（ない）→技巧のない→素朴な"},{"word":"ascetic","meaning":"禁欲的な・苦行者","etymology":"asketes（修行者）→修行して欲を断つ"},{"word":"aspersion","meaning":"中傷・悪口・名誉毀損","etymology":"ad + spergere（まき散らす）→悪口をまき散らす。\"cast aspersions\"の形で頻出"},{"word":"assiduous","meaning":"勤勉な・孜々たる","etymology":"ad + sedere（座る）→座り続けて取り組む→勤勉な"},{"word":"attenuate","meaning":"弱める・希薄にする","etymology":"ad + tenuis（薄い）→薄くしていく。tenuousと同語根"},{"word":"audacious","meaning":"大胆な・向こう見ずな","etymology":"audax（大胆な）→auditorium（聴衆）と同語根。大きく聞こえるほど大胆"},{"word":"austere","meaning":"厳格な・質素な・禁欲的な","etymology":"austeros（厳しい）→余計なものを削ぎ落とした厳しさ"},{"word":"aver","meaning":"断言する・主張する","etymology":"ad + verus（真実）→真実として断言する"},{"word":"banal","meaning":"陳腐な・平凡な","etymology":"ban（公共の）→誰でも使える→使い古された陳腐さ"},{"word":"belie","meaning":"偽る・〜と矛盾する・裏切る","etymology":"be + lie（嘘）→嘘をつく→矛盾する"},{"word":"beneficent","meaning":"善行をする・慈善的な","etymology":"bene（良い）+ facere（行う）→良いことを行う"},{"word":"bombastic","meaning":"大げさな・誇張した・仰々しい","etymology":"bombax（綿）→綿で膨らませたように中身のない大げさな言葉"},{"word":"boorish","meaning":"無作法な・粗野な・野蛮な","etymology":"boer（農民）→洗練されていない農民のような粗野さ"},{"word":"burgeon","meaning":"急成長する・芽吹く","etymology":"bourgeon（芽）→芽が一気に出るように急成長する"},{"word":"burnish","meaning":"磨く・磨いて光らせる","etymology":"brunir（磨く）→「バーニッシュ」→ブラシで磨いて光らせる"},{"word":"buttress","meaning":"支える・強化する・控え壁","etymology":"bouteret（支える）→押して支える教会の控え壁"},{"word":"cacophonous","meaning":"不協和音の・耳障りな","etymology":"kako（悪い）+ phone（音）→悪い音→不協和音"},{"word":"cant","meaning":"偽善的な言葉・隠語・傾ける","etymology":"cantare（歌う）→歌うように繰り返す偽善的な言葉"},{"word":"capricious","meaning":"気まぐれな・移り気な","etymology":"capra（ヤギ）→ヤギのように気まぐれに跳び回る"},{"word":"castigation","meaning":"厳しい批判・懲罰","etymology":"castigare（罰する）→厳しく罰して批判する"},{"word":"catalyst","meaning":"触媒・変化を促すもの","etymology":"kata（下に）+ lyein（解く）→反応を促進して解く"},{"word":"causality","meaning":"因果関係・原因と結果","etymology":"causa（原因）→原因と結果の関係"},{"word":"chicanery","meaning":"詭弁・ごまかし・策略","etymology":"chicaner（言い争う）→言葉でごまかす策略"},{"word":"coagulate","meaning":"凝固する・固まる","etymology":"co + agere（動かす）→一緒に動いて固まる"},{"word":"commensurate","meaning":"釣り合った・相応の","etymology":"com + mensura（測定）→同じ尺度で測れる→釣り合った"},{"word":"compendium","meaning":"概要・要覧・便覧","etymology":"com + pendere（量る）→全体を量って要約したもの"},{"word":"complaisant","meaning":"従順な・人に従いやすい","etymology":"com + plaire（喜ばせる）→人を喜ばせようと従う"},{"word":"conciliatory","meaning":"なだめるような・和解的な","etymology":"conciliare（和解させる）→争いをなだめて和解させる"},{"word":"concomitant","meaning":"付随する・同時に起こる","etymology":"con + comitari（同行する）→一緒に同行して起こる"},{"word":"confound","meaning":"混乱させる・困惑させる","etymology":"con + fundere（注ぐ）→一緒に注いで混ぜる→混乱させる"},{"word":"contentious","meaning":"論争好きな・議論を引き起こす","etymology":"con + tendere（争う）→争いを引き起こす"},{"word":"conundrum","meaning":"難問・なぞなぞ","etymology":"語源不明だが「コナンドラム」→名探偵コナンも解けない難問"},{"word":"conventional","meaning":"慣習的な・従来の","etymology":"con + venire（来る）→皆が集まって合意した慣習"},{"word":"convoluted","meaning":"複雑な・曲がりくねった","etymology":"con + volvere（回す）→グルグル巻きにした複雑さ"},{"word":"cosmology","meaning":"宇宙論・宇宙の構造","etymology":"cosmos（宇宙）+ logos（学問）→宇宙の秩序を研究する学問"},{"word":"craven","meaning":"臆病な・卑怯な","etymology":"cravanter（打ち負かす）→打ち負かされて臆病になる"},{"word":"credence","meaning":"信用・信頼・信憑性","etymology":"credere（信じる）→信じること。creditと同語根"},{"word":"decorum","meaning":"礼儀正しさ・品位・慎み","etymology":"decor（飾り）→品よく飾られた礼儀正しさ"},{"word":"deference","meaning":"敬意・服従・尊重","etymology":"de + ferre（運ぶ）→相手に判断を委ねる→敬意を示す"},{"word":"delineate","meaning":"描写する・輪郭を描く・説明する","etymology":"de + lineare（線を引く）→線を引いて輪郭を描く"},{"word":"demotic","meaning":"民衆の・口語的な・通俗的な","etymology":"demos（民衆）→民衆の言葉。democracyと同語根"},{"word":"demur","meaning":"異議を唱える・ためらう","etymology":"de + morari（遅らせる）→遅らせるほどためらう"},{"word":"denigrate","meaning":"貶める・中傷する・軽視する","etymology":"de + niger（黒い）→黒く塗りつぶす→貶める"},{"word":"denouement","meaning":"結末・大団円・解決","etymology":"de + nouer（結ぶ）→結び目を解く→物語の結末"},{"word":"derivative","meaning":"派生的な・独創性のない・派生物","etymology":"de + rivus（川）→川から引いた支流→派生したもの"},{"word":"desiccate","meaning":"乾燥させる・干からびさせる","etymology":"de + siccare（乾かす）→完全に乾かす"},{"word":"desultory","meaning":"散漫な・行き当たりばったりの" // tag付与
GRE_WORDS.forEach(function(v){v.tag="gre";});
TOEFL1_WORDS.forEach(function(v){v.tag="toefl1";});
TOEFL2_WORDS.forEach(function(v){v.tag="toefl2";});

var ALL_WORDS=GRE_WORDS.concat(TOEFL1_WORDS).concat(TOEFL2_WORDS);

// ===== 状態 =====
var wrongWords=JSON.parse(localStorage.getItem("vocab_wrong")||"[]");
var stats=JSON.parse(localStorage.getItem("vocab_stats")||"{}");
var qs=[],cur=0,corr=0,answered=false;
var lastPool=[],currentDir="en2ja";
var listExamFilter="all";

function saveWrong(){localStorage.setItem("vocab_wrong",JSON.stringify(wrongWords));}
function saveStats(){localStorage.setItem("vocab_stats",JSON.stringify(stats));}

function recordResult(word,correct){
  if(!stats[word])stats[word]={attempts:0,correct:0};
  stats[word].attempts++;
  if(correct)stats[word].correct++;
  saveStats();
}

function showTab(t){
  document.querySelectorAll(".screen").forEach(function(s){s.classList.remove("active");});
  document.querySelectorAll(".nav-btn").forEach(function(b){b.classList.remove("active");});
  document.getElementById(t).classList.add("active");
  document.querySelectorAll(".nav-btn")[["home","quiz","list"].indexOf(t)].classList.add("active");
  if(t==="list")filterList();
  if(t==="home")updatePoolCount();
}

function toggleChip(el,group){
  var id=group+"-chips";
  var chips=document.getElementById(id).querySelectorAll(".filter-chip");
  chips.forEach(function(c){c.classList.remove("selected");});
  el.classList.add("selected");
  updatePoolCount();
}

function toggleListExam(el){
  document.querySelectorAll("#list-mode-chips .filter-chip").forEach(function(c){c.classList.remove("selected");});
  el.classList.add("selected");
  listExamFilter=el.getAttribute("data-listexam");
  filterList();
}

function getSelected(groupId,dataKey){
  var sel=document.querySelector("#"+groupId+" .filter-chip.selected");
  return sel?sel.getAttribute("data-"+dataKey):null;
}

function buildPool(){
  var exam=getSelected("exam-chips","exam");
  var dir=getSelected("dir-chips","dir");
  var status=getSelected("status-chips","status");
  var acc=getSelected("acc-chips","acc");
  var pool=ALL_WORDS.filter(function(v){
    // exam filter
    if(exam!=="all"&&v.tag!==exam)return false;
    // ja2en mode requires meaning (TOEFL words without meaning cannot be used)
    if(dir==="ja2en"&&(!v.meaning||v.meaning===""))return false;
    var s=stats[v.word];
    var attempts=s?s.attempts:0;
    var accuracy=s&&attempts>0?s.correct/s.attempts:null;
    if(status==="new"&&attempts>0)return false;
    if(status==="tried"&&attempts===0)return false;
    if(status==="wrong"&&wrongWords.indexOf(v.word)<0)return false;
    if(acc!=="all"&&attempts>0){
      if(acc==="weak"&&accuracy>=0.5)return false;
      if(acc==="mid"&&(accuracy<0.5||accuracy>=0.8))return false;
      if(acc==="good"&&accuracy<0.8)return false;
    }
    return true;
  });
  return pool;
}

function updatePoolCount(){
  var pool=buildPool();
  var count=parseInt(getSelected("count-chips","count")||"20");
  var actual=Math.min(pool.length,count);
  var el=document.getElementById("pool-count");
  var btn=document.getElementById("start-btn");
  var dir=getSelected("dir-chips","dir");
  var exam=getSelected("exam-chips","exam");
  var note="";
  if(dir==="ja2en"&&(exam==="toefl1"||exam==="toefl2")){
    note="（日→英はTOEFL単語には現在対応不可：意味データ未登録）";
  }
  if(pool.length===0){
    el.textContent="対象: 0語 "+note;
    el.style.color="#dc2626";
    btn.disabled=true;
  }else{
    el.textContent="対象: "+pool.length+"語 → "+actual+"問出題 "+note;
    el.style.color="#007aff";
    btn.disabled=false;
  }
}

function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}

function startFiltered(){
  var pool=buildPool();
  if(pool.length===0)return;
  var count=parseInt(getSelected("count-chips","count")||"20");
  currentDir=getSelected("dir-chips","dir");
  lastPool=pool;
  launchQuiz(shuffle(pool).slice(0,count));
}

function retryMode(){
  if(lastPool.length===0)return;
  var count=parseInt(getSelected("count-chips","count")||"20");
  launchQuiz(shuffle(lastPool).slice(0,count));
}

function startWrongOnly(){
  var pool=ALL_WORDS.filter(function(v){return wrongWords.indexOf(v.word)>=0;});
  if(pool.length===0){alert("間違えた単語がありません！");return;}
  lastPool=pool;
  launchQuiz(shuffle(pool).slice(0,20));
}

function launchQuiz(pool){
  qs=pool;cur=0;corr=0;answered=false;
  document.getElementById("result-wrap").style.display="none";
  document.getElementById("q-card").style.display="";
  document.getElementById("reveal-btn").style.display="block";
  document.getElementById("choices-wrap").style.display="none";
  showTab("quiz");
  renderQ();
}

function getChoices(q){
  // 選択肢プールは出題と同じtag優先で作る（混ざりすぎを防ぐ）
  var samePool=ALL_WORDS.filter(function(v){return v.tag===q.tag&&v.word!==q.word;});
  if(samePool.length<3)samePool=ALL_WORDS.filter(function(v){return v.word!==q.word;});
  // ja2en なら日本語意味が別のもの、en2ja でも同様
  // 意味が空のものは選択肢として不適切なので除外（en→日 でも混乱防止）
  var filtered=samePool.filter(function(v){return v.meaning&&v.meaning!=="";});
  if(filtered.length<3)filtered=samePool;
  var shuf=shuffle(filtered).slice(0,3);
  var correctAns,wrongs;
  if(currentDir==="ja2en"){
    correctAns=q.word;
    wrongs=shuf.map(function(v){return v.word;});
  }else{
    correctAns=q.meaning||"（意味未登録）";
    wrongs=shuf.map(function(v){return v.meaning||v.word;});
  }
  return shuffle([correctAns].concat(wrongs));
}

function renderQ(){
  if(cur>=qs.length){showResult();return;}
  answered=false;
  var q=qs[cur];
  var wordEl=document.getElementById("word");
  if(currentDir==="ja2en"){
    wordEl.textContent=q.meaning||"（意味未登録）";
    wordEl.style.fontSize="22px";
  }else{
    wordEl.textContent=q.word;
    wordEl.style.fontSize="30px";
  }
  document.getElementById("q-prog").textContent="問題 "+(cur+1)+" / "+qs.length;
  document.getElementById("fb").textContent="";
  document.getElementById("etym-box").style.display="none";
  document.getElementById("nxt-btn").style.display="none";
  document.getElementById("reveal-btn").style.display="block";
  document.getElementById("choices-wrap").style.display="none";
  var ch=getChoices(q);
  var c=document.getElementById("choices");
  c.innerHTML="";
  ch.forEach(function(o){
    var b=document.createElement("button");
    b.className="cb";b.textContent=o;
    b.setAttribute("data-val",o);
    c.appendChild(b);
  });
  c.onclick=function(e){
    var btn=e.target.closest("button");
    if(btn)pick(btn,btn.getAttribute("data-val"),q);
  };
  updateBar();
}

function revealChoices(){
  document.getElementById("reveal-btn").style.display="none";
  document.getElementById("choices-wrap").style.display="block";
}

function pick(btn,sel,q){
  if(answered)return;
  answered=true;
  document.getElementById("choices").onclick=null;
  var correctAnswer=(currentDir==="ja2en")?q.word:(q.meaning||"（意味未登録）");
  var correct=sel===correctAnswer;
  recordResult(q.word,correct);
  var allBtns=document.querySelectorAll(".cb");
  if(correct){
    btn.classList.add("ok");
    document.getElementById("fb").style.color="#065f46";
    document.getElementById("fb").textContent="正解！";
    corr++;
    wrongWords=wrongWords.filter(function(w){return w!==q.word;});
  }else{
    btn.classList.add("ng");
    document.getElementById("fb").style.color="#7f1d1d";
    document.getElementById("fb").textContent="不正解";
    allBtns.forEach(function(b){if(b.getAttribute("data-val")===correctAnswer)b.classList.add("show");});
    if(wrongWords.indexOf(q.word)<0)wrongWords.push(q.word);
  }
  saveWrong();
  cur++;
  // 語源・意味表示（正解時も不正解時も。ja2enなら単語も補足）
  var etymText="";
  if(currentDir==="ja2en"){
    etymText="単語: "+q.word;
    if(q.etymology)etymText+="\n語源: "+q.etymology;
  }else if(q.etymology){
    etymText=q.etymology;
  }
  if(etymText){
    document.getElementById("etym-text").textContent=etymText;
    document.getElementById("etym-box").style.display="block";
  }
  if(correct){
    setTimeout(function(){renderQ();},1200);
  }else{
    document.getElementById("nxt-btn").style.display="block";
  }
  updateBar();
}

function nextQ(){renderQ();}

function updateBar(){
  var done=cur;
  var pct=done>0?Math.round(corr/done*100):0;
  document.getElementById("bar").style.width=pct+"%";
  document.getElementById("sc-lbl").textContent="正解 "+corr+" / "+done;
}

function showResult(){
  document.getElementById("q-card").style.display="none";
  document.getElementById("reveal-btn").style.display="none";
  document.getElementById("choices-wrap").style.display="none";
  var p=Math.round(corr/qs.length*100);
  document.getElementById("r-emoji").textContent=p>=80?"🎉":p>=60?"👍":"💪";
  document.getElementById("r-title").textContent=p>=80?"素晴らしい！":p>=60?"よくできました！":"もう少し！";
  document.getElementById("r-sub").textContent=qs.length+"問中 "+corr+"問正解 ("+p+"%)";
  document.getElementById("r-wrong-btn").style.display=wrongWords.length>0?"block":"none";
  document.getElementById("result-wrap").style.display="block";
}

function getBadge(word){
  var s=stats[word];
  if(!s||s.attempts===0)return {text:"未挑戦",cls:"b-new"};
  var acc=Math.round(s.correct/s.attempts*100);
  var label=s.attempts+"回 "+acc+"%";
  if(acc>=80)return {text:label,cls:"b-ok"};
  if(acc>=50)return {text:label,cls:"b-mid"};
  return {text:label,cls:"b-hot"};
}

function filterList(){
  var q=document.getElementById("search").value.toLowerCase();
  var sort=document.getElementById("sort-select").value;
  var base=ALL_WORDS;
  if(listExamFilter!=="all"){
    base=ALL_WORDS.filter(function(v){return v.tag===listExamFilter;});
  }
  var list=q?base.filter(function(v){return v.word.toLowerCase().indexOf(q)>=0||(v.meaning&&v.meaning.indexOf(q)>=0);}):base.slice();
  if(sort==="alpha"){list.sort(function(a,b){return a.word.localeCompare(b.word);});}
  else if(sort==="attempts_desc"){
    list.sort(function(a,b){
      var sa=stats[a.word]||{attempts:0};var sb=stats[b.word]||{attempts:0};
      return sb.attempts-sa.attempts;
    });
  }else if(sort==="accuracy_asc"){
    list.sort(function(a,b){
      var sa=stats[a.word];var sb=stats[b.word];
      var aa=sa&&sa.attempts>0?sa.correct/sa.attempts:1;
      var ba=sb&&sb.attempts>0?sb.correct/sb.attempts:1;
      return aa-ba;
    });
  }else if(sort==="accuracy_desc"){
    list.sort(function(a,b){
      var sa=stats[a.word];var sb=stats[b.word];
      var aa=sa&&sa.attempts>0?sa.correct/sa.attempts:-1;
      var ba=sb&&sb.attempts>0?sb.correct/sb.attempts:-1;
      return ba-aa;
    });
  }else if(sort==="score_asc"){
    list.sort(function(a,b){
      var sa=stats[a.word];var sb=stats[b.word];
      var as2=sa&&sa.attempts>0?(sa.correct/sa.attempts)*sa.attempts:999;
      var bs2=sb&&sb.attempts>0?(sb.correct/sb.attempts)*sb.attempts:999;
      return as2-bs2;
    });
  }
  var container=document.getElementById("word-list");
  container.innerHTML="";
  list.forEach(function(v){
    var badge=getBadge(v.word);
    var div=document.createElement("div");
    div.className="wi";
    div.onclick=function(){this.classList.toggle("open");};
    var sp=document.createElement("span");
    sp.className="wb "+badge.cls;
    sp.textContent=badge.text;
    div.appendChild(sp);
    var dw=document.createElement("div");
    dw.className="ww";dw.textContent=v.word+" ["+v.tag.toUpperCase()+"]";
    div.appendChild(dw);
    var dm=document.createElement("div");
    dm.className="wm";dm.textContent=v.meaning||"（意味未登録）";
    div.appendChild(dm);
    var de=document.createElement("div");
    de.className="we";de.textContent=v.etymology||"語源データなし";
    div.appendChild(de);
    container.appendChild(div);
  });
}

updatePoolCount();
