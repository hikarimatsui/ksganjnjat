</div>

g":"詮索好きな・好奇心旺盛な"},{"word":"insouciance","meaning":"無頓着・のんきさ"},{"word":"insurgent","meaning":"反乱者・反乱の"},{"word":"intrepid","meaning":"大胆な・勇敢な"},{"word":"intrigue","meaning":"陰謀・策略・興味をそそる"},{"word":"inundate","meaning":"殺到する・水浸しにする"},{"word":"inveterate","meaning":"根深い・常習的な"},{"word":"iridescent","meaning":"虹色の・玉虫色の"},{"word":"irradiate","meaning":"照射する・輝かせる"},{"word":"irrefutable","meaning":"反論できない・反駁不可能な"},{"word":"jurisprudence","meaning":"法学・法哲学"},{"word":"larceny","meaning":"窃盗・盗み"},{"word":"lascivious","meaning":"好色な・淫らな"},{"word":"libel","meaning":"文書による名誉毀損"},{"word":"licentious","meaning":"放縦な・道徳を無視した"},{"word":"malaise","meaning":"倦怠感・不調・漠然とした不安"},{"word":"meager","meaning":"乏しい・貧弱な・不十分な"},{"word":"melee","meaning":"乱闘・混乱した大混戦"},{"word":"milieu","meaning":"環境・社会的背景"},{"word":"mollify","meaning":"なだめる・和らげる"},{"word":"nadir","meaning":"最低点・どん底"},{"word":"neologism","meaning":"新語・造語"},{"word":"neophyte","meaning":"初心者・新参者"},{"word":"nuance","meaning":"ニュアンス・微妙な違い"},{"word":"oblique","meaning":"斜めの・遠回しな・間接的な"},{"word":"oblivious","meaning":"気づかない・無頓着な"},{"word":"obstreperous","meaning":"騒々しい・手に負えない"},{"word":"odious","meaning":"不快な・嫌悪すべき"},{"word":"oeuvre","meaning":"芸術家の全作品・作品集"},{"word":"officious","meaning":"でしゃばりな・余計なお世話をする"},{"word":"onus","meaning":"責任・義務・負担"},{"word":"orthodoxy","meaning":"正統・慣習に従うこと"},{"word":"pallid","meaning":"青白い・精彩を欠く"},{"word":"panacea","meaning":"万能薬・万能の解決策"},{"word":"panegyric","meaning":"賛辞・称賛の演説"},{"word":"pariah","meaning":"のけ者・社会的追放者"},{"word":"parvenu","meaning":"成り上がり者・新興成金"},{"word":"patina","meaning":"風格・古びた趣"},{"word":"penchant","meaning":"強い好み・傾向"},{"word":"penurious","meaning":"極貧の・けちな"},{"word":"pittance","meaning":"わずかな報酬・雀の涙"},{"word":"plodding","meaning":"単調にこつこつ働く・のろい"},{"word":"poignant","meaning":"心を打つ・胸が痛い"},{"word":"precipitous","meaning":"急峻な・性急な"},{"word":"preclude","meaning":"妨げる・排除する・不可能にする"},{"word":"preempt","meaning":"先手を打つ・先取りする"},{"word":"presumption","meaning":"推定・思い上がり"},{"word":"prevaricate","meaning":"言い逃れをする・ごまかす"},{"word":"pristine","meaning":"清潔な・汚れていない・原始の"},{"word":"probation","meaning":"仮釈放・試用期間・見習い期間"},{"word":"profusion","meaning":"豊富・大量・あふれるほど"},{"word":"propitious","meaning":"好都合な・縁起のよい"},{"word":"prudent","meaning":"慎重な・思慮深い・賢明な"},{"word":"pulverize","meaning":"粉砕する・完膚なきまでに倒す"},{"word":"quiescent","meaning":"静止した・不活発な・休止中の"},{"word":"rakish","meaning":"しゃれた・放埒な・傾いた"},{"word":"rancor","meaning":"強い憎しみ・怨恨・積年の恨み"},{"word":"rankle","meaning":"しこりとなる・いつまでも苦しめる"},{"word":"rebut","meaning":"反論する・論駁する"},{"word":"recapitulate","meaning":"要約する・繰り返す・まとめる"},{"word":"recount","meaning":"詳しく話す・数え直す"},{"word":"recuperate","meaning":"回復する・元気を取り戻す"},{"word":"relinquish","meaning":"放棄する・手放す・諦める"},{"word":"renege","meaning":"約束を破る・撤回する"},{"word":"repeal","meaning":"廃止する・撤廃する"},{"word":"reproach","meaning":"非難する・叱責・恥ずべきこと"},{"word":"resilient","meaning":"回復力のある・しなやかな・弾力のある"},{"word":"retrofit","meaning":"改造する・後付けする"},{"word":"reverberate","meaning":"反響する・響き渡る・余波を及ぼす"},{"word":"savant","meaning":"博識者・学者・知識人"},{"word":"scathe","meaning":"厳しく批判する・傷つける"},{"word":"scrupulous","meaning":"良心的な・細心の・正直な"},{"word":"secular","meaning":"世俗的な・非宗教的な・現世の"},{"word":"sever","meaning":"切断する・断ち切る・絶つ"},{"word":"singular","meaning":"並外れた・独特の・単数の"},{"word":"smattering","meaning":"わずかな知識・少量"},{"word":"stalwart","meaning":"頑強な・断固とした・忠実な支持者"},{"word":"transitory","meaning":"一時的な・はかない・短命な"},{"word":"travesty","meaning":"茶番・歪曲・ひどい模倣"},{"word":"truculent","meaning":"好戦的な・攻撃的な・凶暴な"},{"word":"unmistakable","meaning":"見まがいようのない・明白な"},{"word":"unobtrusive","meaning":"目立たない・控えめな・邪魔にならない"},{"word":"unsound","meaning":"不健全な・根拠のない・欠陥のある"},{"word":"verdant","meaning":"緑豊かな・青々とした・未熟な"},{"word":"verisimilitude","meaning":"真実らしさ・本物らしさ"},{"word":"vie","meaning":"競う・張り合う・争う"},{"word":"vignette","meaning":"短い描写・小品・コマ絵"},{"word":"virulence","meaning":"毒性・悪意の強さ・猛毒"},{"word":"vitriol","meaning":"辛辣な批判・毒舌・硫酸"},{"word":"wistful","meaning":"物思いにふけった・切ない・もの悲しい"}];

let wrongWords = JSON.parse(localStorage.getItem('wrongWords') || '[]');
let qs=[],cur=0,corr=0,answered=false,mode='normal';

function saveWrong(){localStorage.setItem('wrongWords',JSON.stringify(wrongWords));}

function showHome(){
  document.getElementById('mode-screen').style.display='';
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('result-screen').style.display='none';
  const n=wrongWords.length;
  document.getElementById('wrong-badge').textContent=n>0?n+'語':'';
  document.getElementById('wrong-count').textContent=n>0?'間違えた単語: '+n+'語':'';
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function startMode(m){
  mode=m;
  if(m==='wrong'){
    if(wrongWords.length===0){alert('まだ間違えた単語がありません！');return;}
    const pool=V.filter(v=>wrongWords.includes(v.word));
    qs=shuffle([...pool]).slice(0,20);
  } else {
    qs=shuffle([...V]).slice(0,20);
  }
  cur=0;corr=0;answered=false;
  document.getElementById('mode-screen').style.display='none';
  document.getElementById('result-screen').style.display='none';
  document.getElementById('quiz-screen').style.display='';
  render();
}

function getChoices(q){
  const others=V.filter(v=>v.word!==q.word);
  return shuffle([q.meaning,...shuffle([...others]).slice(0,3).map(v=>v.meaning)]);
}

function render(){
  if(cur>=qs.length){showResult();return;}
  answered=false;
  const q=qs[cur];
  document.getElementById('word').textContent=q.word;
  document.getElementById('q-prog').textContent='問題 '+(cur+1)+' / '+qs.length;
  document.getElementById('fb').textContent='';
  document.getElementById('fb').style.color='';
  document.getElementById('nxt-btn').style.display='none';
  const choices=getChoices(q);
  const c=document.getElementById('choices');
  c.innerHTML='';
  choices.forEach(ch=>{
    const b=document.createElement('button');
    b.className='cb';b.textContent=ch;
    b.onclick=()=>pick(b,ch,q);
    c.appendChild(b);
  });
  updateBar();
}

function pick(btn,sel,q){
  if(answered)return;
  answered=true;
  const all=document.querySelectorAll('.cb');
  all.forEach(b=>b.onclick=null);
  const fb=document.getElementById('fb');
  if(sel===q.meaning){
    btn.classList.add('ok');
    fb.style.color='#065f46';fb.textContent='正解！';
    corr++;
    // 正解したら間違いリストから削除
    wrongWords=wrongWords.filter(w=>w!==q.word);
    saveWrong();
    cur++;
    // 正解なら0.6秒後に自動で次へ
    setTimeout(()=>render(),600);
  } else {
    btn.classList.add('ng');
    fb.style.color='#7f1d1d';fb.textContent='不正解';
    all.forEach(b=>{if(b.textContent===q.meaning)b.classList.add('show');});
    // 間違いリストに追加
    if(!wrongWords.includes(q.word))wrongWords.push(q.word);
    saveWrong();
    cur++;
    document.getElementById('nxt-btn').style.display='block';
  }
  updateBar();
}

function next(){render();}

function updateBar(){
  const done=cur;
  const pct=done>0?Math.round(corr/done*100):0;
  document.getElementById('bar').style.width=pct+'%';
  document.getElementById('sc-lbl').textContent='正解 '+corr+' / '+done;
}

function showResult(){
  document.getElementById('quiz-screen').style.display='none';
  const total=qs.length;
  const pct=Math.round(corr/total*100);
  document.getElementById('r-title').textContent=pct>=80?'素晴らしい！':pct>=60?'よくできました！':'もう少し！';
  document.getElementById('r-sub').textContent=total+'問中 '+corr+'問正解 ('+pct+'%)';
  const wn=wrongWords.length;
  document.getElementById('r-wrong-cnt').textContent=wn>0?'('+wn+'語)':'';
  document.getElementById('btn-wrong').style.display=wn>0?'block':'none';
  document.getElementById('result-screen').style.display='';
}

showHome();
</script>
