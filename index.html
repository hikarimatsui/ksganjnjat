<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GRE必修単語テスト</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#f2f2f7;min-height:100vh;}
#nav{display:flex;background:#fff;border-bottom:1px solid #e5e5ea;position:sticky;top:0;z-index:10;}
.nav-btn{flex:1;padding:12px 4px;border:none;background:none;font-size:13px;color:#8e8e93;cursor:pointer;border-bottom:2px solid transparent;}
.nav-btn.active{color:#007aff;border-bottom:2px solid #007aff;font-weight:600;}
.screen{display:none;padding:16px 14px 40px;max-width:480px;margin:0 auto;}
.screen.active{display:block;}
/* home */
#home-title{font-size:22px;font-weight:700;text-align:center;color:#1c1c1e;margin:16px 0 4px;}
#home-sub{font-size:13px;color:#8e8e93;text-align:center;margin-bottom:20px;}
/* mode cards */
.mode-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.mode-card-title{font-size:16px;font-weight:600;color:#1c1c1e;margin-bottom:4px;}
.mode-card-desc{font-size:13px;color:#8e8e93;margin-bottom:12px;}
.mode-card-count{font-size:12px;font-weight:500;color:#007aff;margin-bottom:12px;}
/* filter rows */
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.filter-row label{font-size:12px;color:#8e8e93;margin-bottom:4px;display:block;}
.filter-chip{padding:6px 12px;border:1.5px solid #e5e5ea;border-radius:20px;font-size:13px;color:#8e8e93;background:#fff;cursor:pointer;white-space:nowrap;}
.filter-chip.selected{border-color:#007aff;color:#007aff;background:#eff6ff;font-weight:500;}
.start-btn{display:block;width:100%;padding:14px;background:#007aff;border:none;border-radius:13px;font-size:16px;font-weight:600;color:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.start-btn:disabled{background:#c7c7cc;cursor:default;}
/* list */
#list-controls{display:flex;gap:8px;margin-bottom:12px;align-items:center;}
#search{flex:1;padding:10px 14px;border:1px solid #e5e5ea;border-radius:10px;font-size:15px;background:#fff;}
#sort-select{padding:10px 8px;border:1px solid #e5e5ea;border-radius:10px;font-size:13px;background:#fff;color:#1c1c1e;}
.wi{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px;position:relative;}
.wi .ww{font-size:16px;font-weight:600;color:#1c1c1e;padding-right:72px;}
.wi .wm{font-size:13px;color:#8e8e93;margin-top:2px;}
.wi .we{font-size:12px;color:#007aff;margin-top:6px;display:none;line-height:1.6;}
.wi.open .we{display:block;}
.wb{position:absolute;top:12px;right:12px;font-size:11px;font-weight:600;padding:3px 7px;border-radius:20px;white-space:nowrap;}
.b-hot{background:#fee2e2;color:#dc2626;}
.b-ok{background:#d1fae5;color:#065f46;}
.b-mid{background:#fef3c7;color:#92400e;}
.b-new{background:#f1f5f9;color:#64748b;}
/* quiz */
#bar-wrap{background:#e5e5ea;border-radius:4px;height:5px;margin-bottom:5px;}
#bar{height:5px;background:#34c759;border-radius:4px;width:0%;transition:width .3s;}
#sc-lbl{font-size:12px;color:#8e8e93;text-align:right;margin-bottom:16px;}
#q-card{background:#fff;border-radius:16px;padding:28px 20px 20px;margin-bottom:14px;text-align:center;}
#word{font-size:30px;font-weight:700;color:#1c1c1e;margin-bottom:6px;word-break:break-all;line-height:1.2;}
#q-prog{font-size:13px;color:#8e8e93;}
#reveal-btn{display:block;width:100%;padding:15px;background:#f2f2f7;border:1.5px dashed #c7c7cc;border-radius:13px;font-size:15px;color:#8e8e93;cursor:pointer;margin-bottom:10px;-webkit-tap-highlight-color:transparent;}
#choices-wrap{display:none;}
.cb{display:block;width:100%;text-align:left;background:#fff;border:1.5px solid #e5e5ea;border-radius:13px;padding:14px 15px;margin-bottom:10px;font-size:16px;color:#1c1c1e;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.cb.ok{background:#d1fae5;border-color:#34c759;color:#065f46;}
.cb.ng{background:#fee2e2;border-color:#ff3b30;color:#7f1d1d;}
.cb.show{background:#d1fae5;border-color:#34c759;color:#065f46;}
#fb{font-size:16px;font-weight:600;text-align:center;min-height:22px;margin:6px 0 6px;}
#etym-box{background:#fff;border-radius:13px;padding:14px 16px;margin-bottom:10px;display:none;}
#etym-box .lbl{font-size:11px;font-weight:600;color:#007aff;margin-bottom:4px;}
#etym-box .txt{font-size:14px;color:#3a3a3c;line-height:1.6;}
#nxt-btn{display:none;width:100%;padding:15px;background:#007aff;border:none;border-radius:13px;font-size:16px;font-weight:600;color:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent;}
#result-wrap{display:none;text-align:center;padding:30px 0;}
.r-emoji{font-size:48px;margin-bottom:12px;}
#result-wrap h2{font-size:24px;font-weight:700;margin-bottom:8px;color:#1c1c1e;}
.r-msg{font-size:15px;color:#ff9500;font-weight:500;margin-bottom:8px;}
#result-wrap p{font-size:16px;color:#8e8e93;margin-bottom:28px;}
.r-btn{display:block;width:100%;padding:15px;border:none;border-radius:13px;font-size:16px;font-weight:600;cursor:pointer;margin-bottom:12px;-webkit-tap-highlight-color:transparent;}
</style>
</head>
<body>
<div id="nav">
  <button class="nav-btn active" onclick="showTab('home')">ホーム</button>
  <button class="nav-btn" onclick="showTab('quiz')">クイズ</button>
  <button class="nav-btn" onclick="showTab('list')">単語リスト</button>
</div>

<!-- HOME -->
<div id="home" class="screen active">
  <div id="home-title">GRE必修単語テスト</div>
  <div id="home-sub">785語収録・語源付き</div>

  <!-- 学習状況フィルター -->
  <div class="mode-card">
    <div class="mode-card-title">学習状況</div>
    <div class="mode-card-desc">どの単語を出題するか選んでね</div>
    <div class="filter-row" id="status-chips">
      <button class="filter-chip selected" data-status="all" onclick="toggleChip(this,'status')">すべて</button>
      <button class="filter-chip" data-status="new" onclick="toggleChip(this,'status')">未挑戦のみ</button>
      <button class="filter-chip" data-status="tried" onclick="toggleChip(this,'status')">取組済みのみ</button>
      <button class="filter-chip" data-status="wrong" onclick="toggleChip(this,'status')">間違えた単語</button>
    </div>

    <div class="mode-card-title" style="margin-top:12px;">苦手度フィルター</div>
    <div class="mode-card-desc">正答率で絞り込み（取組済みのみ有効）</div>
    <div class="filter-row" id="acc-chips">
      <button class="filter-chip selected" data-acc="all" onclick="toggleChip(this,'acc')">すべて</button>
      <button class="filter-chip" data-acc="weak" onclick="toggleChip(this,'acc')">苦手（〜49%）</button>
      <button class="filter-chip" data-acc="mid" onclick="toggleChip(this,'acc')">普通（50〜79%）</button>
      <button class="filter-chip" data-acc="good" onclick="toggleChip(this,'acc')">得意（80%〜）</button>
    </div>

    <div class="mode-card-title" style="margin-top:12px;">問題数</div>
    <div class="filter-row" id="count-chips">
      <button class="filter-chip" data-count="10" onclick="toggleChip(this,'count')">10問</button>
      <button class="filter-chip selected" data-count="20" onclick="toggleChip(this,'count')">20問</button>
      <button class="filter-chip" data-count="30" onclick="toggleChip(this,'count')">30問</button>
      <button class="filter-chip" data-count="50" onclick="toggleChip(this,'count')">50問</button>
    </div>

    <div class="mode-card-count" id="pool-count">対象: 785語</div>
    <button class="start-btn" id="start-btn" onclick="startFiltered()">このモードで始める</button>
  </div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
  <div id="bar-wrap"><div id="bar"></div></div>
  <div id="sc-lbl">0 / 0</div>
  <div id="q-card">
    <div id="word"></div>
    <div id="q-prog"></div>
  </div>
  <button id="reveal-btn" onclick="revealChoices()">タップして選択肢を表示</button>
  <div id="choices-wrap">
    <div id="choices"></div>
    <div id="fb"></div>
    <div id="etym-box">
      <div class="lbl">語源・覚え方</div>
      <div class="txt" id="etym-text"></div>
    </div>
    <button id="nxt-btn" onclick="nextQ()">次の問題 →</button>
  </div>
  <div id="result-wrap">
    <div class="r-emoji" id="r-emoji"></div>
    <h2 id="r-title"></h2>
    <div class="r-msg">お疲れ様！次も頑張ろう！</div>
    <p id="r-sub"></p>
    <button class="r-btn" style="background:#007aff;color:#fff" onclick="showTab('home')">モード選択に戻る</button>
    <button class="r-btn" id="r-retry-btn" style="background:#34c759;color:#fff" onclick="retryMode()">同じ条件でもう一度</button>
    <button class="r-btn" id="r-wrong-btn" style="background:#ff9500;color:#fff;display:none" onclick="startWrongOnly()">間違えた単語を復習</button>
  </div>
</div>

<!-- WORD LIST -->
<div id="list" class="screen">
  <div id="list-controls">
    <input id="search" type="search" placeholder="単語を検索..." oninput="filterList()">
    <select id="sort-select" onchange="filterList()">
      <option value="alpha">A-Z順</option>
      <option value="attempts_desc">取組回数↓</option>
      <option value="accuracy_asc">正答率↓</option>
      <option value="accuracy_desc">正答率↑</option>
      <option value="score_asc">苦手順</option>
    </select>
  </div>
  <div id="word-list"></div>
</div>

<script>
var V=[{"word":"abnegation","meaning":"自己否定・放棄","etymology":"ab（離れて）＋negare（否定する）→negate（否定）と同根。自分を否定して離れる"},{"word":"abortive","meaning":"失敗に終わった・途中で頓挫した・不成功の","etymology":"ab＋oriri（生まれる）→abort（中止）と同根。生まれる前に終わる"},{"word":"absolve","meaning":"罪を免除する・赦免する","etymology":"ab（から）＋solvere（解く）→solve（解く）と同根。罪から解き放つ"},{"word":"acrimony","meaning":"辛辣さ・激しい憎悪・根深い苦々しさ","etymology":"acer（鋭い・辛い）→acrid（辛辣）と同根。鋭く刺さる苦々しさ"},{"word":"affect","meaning":"影響を与える・変化をもたらす（動詞）","etymology":"ad＋facere（する）→factory（工場）と同根。影響を与えて変化させる"},{"word":"altercation","meaning":"激しい口論・言い争い","etymology":"alter（他の）→alternate（交互）と同根。互いに言い合う口論"},{"word":"ample","meaning":"十分な・豊富な","etymology":"amplus（広い）→amplify（増幅）と同根。広々と十分にある"},{"word":"anomaly","meaning":"異常・例外・通常からの逸脱","etymology":"an（否定）＋homos（同じ）→ノーマル（normal）でないもの"},{"word":"apotheosis","meaning":"神格化・頂点・絶頂","etymology":"apo（完全に）＋theos（神）→theology（神学）と同根。神の域に達する頂点"},{"word":"astute","meaning":"機敏な・抜け目ない・鋭い","etymology":"astutus（狡猾な）→シャープ（sharp）な頭脳。抜け目なく鋭い"},{"word":"auspicious","meaning":"縁起のよい・吉兆の","etymology":"avis（鳥）＋spicere（見る）→鳥の飛び方で吉凶を占う古代ローマの慣習"},{"word":"authorization","meaning":"認可・承認・権限付与","etymology":"auctor（創始者）→author（著者）と同根。認める権限を与える"},{"word":"baleful","meaning":"有害な・悪意に満ちた・不吉な","etymology":"bale（悪・苦しみ）＋ful→苦しみに満ちた有害な"},{"word":"belie","meaning":"偽る・〜と矛盾する・〜を裏切る","etymology":"be＋lie（嘘）→見かけと真実が矛盾する"},{"word":"belligerent","meaning":"好戦的な・攻撃的な","etymology":"bellum（戦争）＋gerere（運ぶ）→bellicose（好戦的）と同根。戦争を運ぶ"},{"word":"benediction","meaning":"祝福・祝祷","etymology":"bene（良い）＋dicere（言う）→benefit（恩恵）と同根。良い言葉＝祝福"},{"word":"blithe","meaning":"のんきな・無頓着な・呑気な","etymology":"古英語blithe（幸せな）→のんきで幸せそうな態度"},{"word":"bogus","meaning":"偽物の・インチキな","etymology":"19世紀の偽造硬貨製造機「bogus」由来→偽物・インチキ"},{"word":"bolster","meaning":"支える・強化する・後押しする","etymology":"bole（丸太）から→丸太で支えるように強化する"},{"word":"capricious","meaning":"気まぐれな・変わりやすい","etymology":"capra（ヤギ）→ヤギのようにあちこち跳び回る気まぐれさ"},{"word":"careen","meaning":"傾く・制御を失って突進する","etymology":"carina（船の竜骨）→船が傾くように制御を失って突進する"},{"word":"censure","meaning":"非難する・叱責","etymology":"censere（評価する）→センサー（censor）と同根。評価して非難する"},{"word":"centralization","meaning":"中央集権化","etymology":"centrum（中心）→center（中心）と同根。中心に集める"},{"word":"compatible","meaning":"相性が合う・共存できる・互換性がある","etymology":"com（共に）＋pati（耐える）→共に耐えられる＝相性が合う"},{"word":"concede","meaning":"渋々認める・譲歩する・敗北を認める","etymology":"con＋cedere（譲る）→concession（譲歩）と同根。渋々認める"},{"word":"concomitant","meaning":"付随するもの・伴うもの・付随する","etymology":"con（共に）＋comitari（伴う）→accompany（伴う）と同根"},{"word":"condescend","meaning":"見下す・上から目線で接する","etymology":"con＋de＋scendere（降りる）→descend（降りる）と同根。上から降りてくる＝見下す"},{"word":"contemporary","meaning":"同時代の・現代の","etymology":"con（共に）＋tempus（時）→temporary（一時的）と同根。同じ時代の"},{"word":"convoluted","meaning":"複雑に絡み合った・難解な・回りくどい","etymology":"con＋volvere（回す）→revolve（回転）と同根。複雑に巻き付いた"},{"word":"cornucopia","meaning":"豊富・豊饒・豊饒の角","etymology":"cornu（角）＋copia（豊富）→ユニコーンの角から溢れる豊饒の象徴"},{"word":"corollary","meaning":"当然の結果・系・必然的結論","etymology":"corolla（花冠）→花に続いてつく結果＝当然の帰結"},{"word":"corroborating","meaning":"裏付ける・確証する","etymology":"cor＋roborare（強める）→robust（頑強）と同根。証拠を強める"},{"word":"cynic","meaning":"皮肉屋・人間の善意を信じない人","etymology":"ギリシャのkyon（犬）→犬のように社会の規範を無視した哲学者キュニコス派"},{"word":"debunking","meaning":"誤りを暴く・正体を暴露する","etymology":"de＋bunk（たわごと）→たわごとを暴く"},{"word":"delineate","meaning":"描写する・輪郭を描く・説明する","etymology":"de＋linea（線）→線（line）で輪郭を描く"},{"word":"deplore","meaning":"強く非難する・嘆き悲しむ・遺憾に思う","etymology":"de＋plorare（泣く）→explore（探る）と同根。嘆いて非難する"},{"word":"despicable","meaning":"卑劣な・唾棄すべき・道徳的に最低な","etymology":"de＋spicere（見る）→despise（軽蔑）と同根。見下すほど卑劣"},{"word":"devious","meaning":"狡猾な・裏表のある・ずる賢い","etymology":"de＋via（道）→deviation（逸脱）と同根。正道から外れた狡猾さ"},{"word":"dilettante","meaning":"素人愛好家・本格的でない趣味人","etymology":"イタリア語dilettare（楽しむ）→delight（喜び）と同根。楽しみだけで学ぶ素人"},{"word":"disinter","meaning":"掘り起こす・埋葬されたものを発掘する","etymology":"dis＋in＋terra（土）→土の中から掘り出す"},{"word":"disingenuous","meaning":"不誠実な・打算的な・純真のふりをした狡猾な","etymology":"dis（否定）＋ingenuous（純真な）→純真のふりをした不誠実さ"},{"word":"disposition","meaning":"気質・性向・傾向","etymology":"dis＋ponere（置く）→compose（構成）と同根。心の置き方＝気質"},{"word":"distinction","meaning":"卓越・区別・優秀さ","etymology":"dis＋stinguere（刺す）→distinguish（区別）と同根。刺して区別する"},{"word":"dither","meaning":"うろたえる・決断できずにうろうろする","etymology":"古英語didder（震える）→決断できずにブルブル震えてうろうろする"},{"word":"edifying","meaning":"有益な・教化的な・ためになる","etymology":"aedes（神殿）→edifice（建物）と同根。精神的な建物を作る＝教化する"},{"word":"elimination","meaning":"排除・廃止・除去","etymology":"e＋limen（敷居）→eliminate（排除）と同根。敷居の外に出す"},{"word":"elusive","meaning":"捉えどころのない・つかみにくい","etymology":"e＋ludere（遊ぶ）→elude（逃れる）と同根。つかまえようとすると逃げる"},{"word":"embroiled","meaning":"紛争・トラブルに巻き込まれた・泥沼にはまった","etymology":"em＋broil（混乱）→ブロイル（焼く）のように炎上してトラブルに巻き込まれる"},{"word":"emulate","meaning":"手本にして真似る・凌ごうとして模倣する","etymology":"aemulari（競う）→エミュレーター（emulator）と同根"},{"word":"enamored","meaning":"魅了された・恋い焦がれた","etymology":"en＋amor（愛）→amorous（恋愛の）と同根。愛に捕われた"},{"word":"enervate","meaning":"気力・体力を奪う・ぐったりさせる","etymology":"e＋nervus（神経）→nerve（神経）と同根。神経を抜く＝気力を奪う"},{"word":"enthrall","meaning":"魅了する・夢中にさせる","etymology":"en＋thrall（奴隷）→奴隷にするほど魅了する"},{"word":"ephemeral","meaning":"一時的な・はかない・短命な","etymology":"epi＋hemera（日）→一日しか生きないカゲロウのイメージ"},{"word":"epithet","meaning":"形容語句・あだ名・称号","etymology":"epi（上に）＋tithenai（置く）→名前の上に置く言葉＝あだ名・称号"},{"word":"espouse","meaning":"支持する・採用する","etymology":"ex＋sponsus（婚約者）→spouse（配偶者）と同根。主義を妻のように受け入れる"},{"word":"esoteric","meaning":"難解な・秘教的な・一部の人にしかわからない","etymology":"eso（内側）→内側の人だけが知る秘密の知識"},{"word":"estrangement","meaning":"疎遠・仲たがい・心が離れた状態","etymology":"extraneus（外の）→strange（奇妙・よそよそしい）と同根。よそ者になる"},{"word":"eulogize","meaning":"称賛する・賛美する・弔辞を述べる","etymology":"eu（良い）＋logos（言葉）→良い言葉で称賛する"},{"word":"euphoric","meaning":"幸福感に満ちた・多幸感の","etymology":"eu（良い）＋pherein（運ぶ）→良い気分を運ぶ＝多幸感"},{"word":"exalt","meaning":"称える・高揚させる・賛美する","etymology":"ex＋altus（高い）→altitude（高度）と同根。高く持ち上げて称える"},{"word":"execrate","meaning":"激しく憎む・呪う・強烈に嫌悪する","etymology":"ex＋sacrare（神聖にする）→sacred（神聖）の反対。呪って激しく憎む"},{"word":"execrable","meaning":"忌まわしい・最悪の・非常に不快な","etymology":"execrare（呪う）→execrateと同根。呪わしいほど最悪"},{"word":"exhume","meaning":"掘り起こす・遺体を発掘する","etymology":"ex＋humus（土）→human（人間）と同根。土から掘り出す"},{"word":"exonerate","meaning":"無罪にする・責任を免除する・容疑を晴らす","etymology":"ex（外に）＋onus（重荷）→onerous（重荷の）と同根。重荷を取り除く＝無罪"},{"word":"expunge","meaning":"抹消する・完全に消し去る","etymology":"ex＋pungere（刺す）→puncture（穴）と同根。刺して抹消する"},{"word":"extant","meaning":"現存する・今も存在する","etymology":"ex＋stare（立つ）→exist（存在）と同根。今もまだ立っている＝現存"},{"word":"extradite","meaning":"犯罪者を他国に引き渡す・送還する","etymology":"extra（外に）＋dare（引き渡す）→国外に引き渡す"},{"word":"falter","meaning":"ひるむ・よろめく・口ごもる・勢いが止まる","etymology":"fold（折れる）から→折れそうになってよろめく"},{"word":"fauna","meaning":"動物相・ある地域の全動物","etymology":"ローマの女神Fauna由来→動物の女神が守る動物相"},{"word":"fealty","meaning":"忠誠・特に君主への忠誠","etymology":"fidelitas（忠実）→fidelity（忠実）と同根。君主への忠誠"},{"word":"felony","meaning":"重罪","etymology":"felo（悪人）→重大な悪行＝重罪"},{"word":"feral","meaning":"野生の・飼いならされていない・凶暴な","etymology":"ferus（野生の）→fierce（獰猛）と同根。野生のままの凶暴さ"},{"word":"fester","meaning":"悪化する・膿む・心にくすぶる","etymology":"fistula（膿んだ管）→傷が膿んで悪化する"},{"word":"flair","meaning":"生まれつきの才能・センス・独特のスタイル","etymology":"フランス語flairer（嗅ぐ）→鼻で感じ取るような生まれつきのセンス"},{"word":"florid","meaning":"華美すぎる・過剰に装飾された・顔が赤みがかった","etymology":"flos（花）→floral（花の）と同根。花のように華美すぎる"},{"word":"flounder","meaning":"もがく・あたふたする・うまくいかない","etymology":"flunder（平らに倒れる）→もがいてあたふたする"},{"word":"foible","meaning":"小さな欠点・弱点","etymology":"フランス語faible（弱い）→feeble（弱い）と同根。小さな弱点"},{"word":"forbidding","meaning":"近づきがたい・威圧的な・不気味な","etymology":"for＋bid（命じる）→近づくなと命じる＝近づきがたい"},{"word":"galvanize","meaning":"奮起させる・電撃的に行動を促す","etymology":"科学者Galvani由来→電気で筋肉を動かす実験から。電撃的に行動を促す"},{"word":"gamut","meaning":"全範囲・全領域・音域","etymology":"音楽のGamma（音階の最低音）から全音域→全範囲"},{"word":"glean","meaning":"少しずつ集める・情報を読み取る","etymology":"古フランス語glener（穂を拾う）→収穫後に残った穂を少しずつ集める"},{"word":"gossamer","meaning":"薄く繊細な・クモの糸のような・かすかな","etymology":"goose（ガチョウ）＋summer→秋のガチョウの羽毛のように薄く繊細"},{"word":"guffaw","meaning":"大笑い・大声で笑うこと","etymology":"擬音語→大声で笑う音そのまま"},{"word":"gullible","meaning":"だまされやすい・信じやすい","etymology":"gull（カモメ・騙される人）→カモのようにだまされやすい"},{"word":"homily","meaning":"説教・訓話・道徳的な説話","etymology":"homilos（集会）→homogeneous（同質）と同根。集会での説教"},{"word":"impregnable","meaning":"難攻不落・侵入不可能な","etymology":"im（否定）＋prehendere（捕まえる）→捕まえられない＝難攻不落"},{"word":"improbable","meaning":"ありそうもない・意外な","etymology":"im（否定）＋probare（証明する）→prove（証明）と同根。証明できない＝ありそうもない"},{"word":"impudent","meaning":"厚かましい・無礼な・生意気な","etymology":"im（否定）＋pudere（恥じる）→恥を知らない厚かましさ"},{"word":"impunity","meaning":"免罰・お咎めなし・刑罰なしに","etymology":"im（否定）＋poena（罰）→penalty（罰則）と同根。罰なし"},{"word":"impertinent","meaning":"生意気な・不適切な・無礼な","etymology":"im（否定）＋pertinere（関係する）→pertinent（適切）の否定。無礼な"},{"word":"incongruous","meaning":"場違いな・周囲と調和しない・不釣り合いな","etymology":"in（否定）＋congruere（合う）→congruent（合同）の否定。不釣り合い"},{"word":"indigence","meaning":"貧困・窮乏","etymology":"indu（中に）＋egere（必要とする）→indigent（貧しい）と同根。貧困"},{"word":"infer","meaning":"推論する・推察する・推測する","etymology":"in＋ferre（運ぶ）→inference（推論）と同根。証拠から結論を運ぶ"},{"word":"infallible","meaning":"絶対に誤らない・完璧無欠な・失敗しない","etymology":"in（否定）＋fallere（欺く）→fallacy（誤謬）の否定。誤りなし"},{"word":"ingenious","meaning":"独創的な・巧妙な・独創的な才能のある","etymology":"in＋genus（生まれ）→genius（天才）と同根。生まれつきの独創性"},{"word":"ingenuous","meaning":"純真な・無邪気な・正直すぎる","etymology":"in＋genus（生まれ）→生まれたままの純粋さ"},{"word":"ingrate","meaning":"恩知らずな人","etymology":"in（否定）＋gratus（感謝）→gratitude（感謝）の否定。恩知らず"},{"word":"inimical","meaning":"有害な・妨げになる・敵対的な","etymology":"in（否定）＋amicus（友人）→enemy（敵）と同根。友でない＝敵対的"},{"word":"insipid","meaning":"味気ない・無味乾燥な・つまらない","etymology":"in（否定）＋sapere（味わう）→sapient（賢明）と同根。味がない＝つまらない"},{"word":"insistence","meaning":"強い主張・断固とした要求・譲らない態度","etymology":"in＋sistere（立つ）→persist（主張し続ける）と同根。立ち続ける強い主張"},{"word":"insolvent","meaning":"支払い不能な・破産状態の","etymology":"in（否定）＋solvere（解く）→solve（解決）の否定。解決できない＝破産"},{"word":"insinuation","meaning":"遠回しな示唆・ほのめかし・中傷","etymology":"in＋sinuate（曲がる）→蛇のように曲がりくねって入り込む示唆"},{"word":"insufferable","meaning":"耐えられない・我慢できないほど不快な","etymology":"in（否定）＋sufferre（耐える）→suffer（苦しむ）の否定。耐えられない"},{"word":"intensification","meaning":"強化・激化","etymology":"in＋tendere（伸ばす）→intense（激烈）と同根。強化・激化"},{"word":"internecine","meaning":"双方に壊滅的な損害をもたらす・共倒れの","etymology":"inter（間で）＋necare（殺す）→nectar（甘露）と同根の語根。双方が殺し合う"},{"word":"interrogate","meaning":"尋問する・問い詰める","etymology":"inter（間で）＋rogare（尋ねる）→interrrogation（尋問）そのまま"},{"word":"improvisation","meaning":"即興・臨機応変","etymology":"im（否定）＋provisus（予見された）→provision（備え）の否定。即興"},{"word":"juxtapose","meaning":"並置する・並べて比較する","etymology":"juxta（隣に）＋ponere（置く）→position（位置）と同根。並べて置く"},{"word":"lackadaisical","meaning":"やる気のない・だらけた・無気力な","etymology":"lackaday（嘆きの言葉）→嘆きながらだらける無気力な態度"},{"word":"levy","meaning":"税・罰金を課す・徴収する","etymology":"levare（持ち上げる）→elevate（持ち上げる）と同根。税を徴収して持ち上げる"},{"word":"limpid","meaning":"澄んだ・透明な・清澄な","etymology":"limpidus（澄んだ）→lymph（リンパ）と同根。透き通るように澄んでいる"},{"word":"loathe","meaning":"激しく嫌悪する・hateより強い憎しみ","etymology":"古英語lathian（憎む）→loathsome（嫌悪すべき）と同根。激しく嫌悪する"},{"word":"lugubrious","meaning":"悲嘆に暮れた・大げさに陰鬱な・重苦しい","etymology":"lugere（悲しむ）→大げさに悲しんで陰鬱な"},{"word":"Machiavellian","meaning":"マキャベリ的な・権謀術数的な・目的のためなら手段を選ばない","etymology":"政治思想家マキャベリ（Machiavelli）由来→目的のためなら手段を選ばない"},{"word":"maligned","meaning":"中傷された・悪く言われた","etymology":"male（悪く）＋gnare（言う）→malign（中傷する）の過去形"},{"word":"mawkish","meaning":"感傷的すぎる・甘ったるいほど感傷的な","etymology":"mawk（ウジ虫）→腐ったものの甘ったるさ＝過剰な感傷"},{"word":"menacing","meaning":"脅威を感じさせる・不気味に危険な","etymology":"minari（脅す）→menace（脅威）と同根。脅威を感じさせる"},{"word":"mercurial","meaning":"気まぐれな・変わりやすい・活発な","etymology":"ローマ神Mercurius（マーキュリー）→水銀のように変わりやすく活発"},{"word":"miscellany","meaning":"雑多なもの・寄せ集め","etymology":"miscere（混ぜる）→mix（混ぜる）と同根。雑多な寄せ集め"},{"word":"misogyny","meaning":"女性嫌悪・ミソジニー","etymology":"misos（嫌う）＋gyne（女性）→gynecology（婦人科）と同根。女性嫌悪"},{"word":"monotony","meaning":"単調さ・変化のない退屈な繰り返し","etymology":"mono（一つ）＋tonos（音）→monotone（単調）そのまま"},{"word":"moot","meaning":"議論する意味がない・もはや無関係な・決着済みの","etymology":"古英語gemot（会議）→会議で議論しても意味がない問題"},{"word":"myopia","meaning":"近視眼的思考・視野の狭さ・近視","etymology":"myein（閉じる）＋ops（目）→目を閉じて見えない＝近視・視野狭窄"},{"word":"nascent","meaning":"生まれたばかりの・発展途上の・ gy":"venerari（崇める）→Venus（ヴィーナス）と同根。崇敬する"},{"word":"veracious","meaning":"正直な・誠実な・真実を語る","etymology":"verax（真実の）→verify（検証）と同根。真実を語る正直な"},{"word":"vestige","meaning":"痕跡・名残・わずかな証拠","etymology":"vestigium（足跡）→investigate（調査）と同根。残された足跡＝痕跡"},{"word":"viable","meaning":"実行可能な・生存可能な・現実的な","etymology":"vita（命）→vital（生命の）と同根。生き続けられる実行可能な"},{"word":"vitiating","meaning":"損なう・価値を下げる・無効にする","etymology":"vitium（欠陥）→vice（悪徳）と同根。欠陥を生じさせて損なう"},{"word":"vituperate","meaning":"激しく非難する・罵倒する","etymology":"vitu（欠陥）＋parare（準備）→欠陥を激しく責め立てる"},{"word":"volubility","meaning":"多弁さ・流暢さ・よく喋ること","etymology":"volvere（回す）→revolve（回転）と同根。口が滑らかに回る多弁さ"},{"word":"whimsical","meaning":"気まぐれな・奇抜な・ユーモラスな","etymology":"whim（気まぐれ）→気まぐれ（whim）が多い奇抜な"},{"word":"zeitgeist","meaning":"時代精神・その時代の空気・時代の気分","etymology":"ドイツ語Zeit（時代）＋Geist（精神）→そのまま時代精神"},{"word":"zealot","meaning":"熱狂的信者・狂信者・過激な信奉者","etymology":"zelotes（熱心な）→zeal（熱意）が過剰な狂信者"},{"word":"abdicate","meaning":"退位する・権利・責任を放棄する","etymology":"ab（離れて）＋dicare（宣言する）→dedicate（捧げる）と同根。権利を宣言して離れる"},{"word":"absolved","meaning":"罪を免除される・赦免される","etymology":"ab＋solvere（解く）→absolve（赦免）の過去形"},{"word":"acrid","meaning":"刺激臭のある・辛辣な","etymology":"acer（鋭い）→acrimony（辛辣）と同根。刺激臭のある辛辣さ"},{"word":"affect (n.)","meaning":"感情・情動（心理学用語）","etymology":"ad＋facere（する）→心理学用語として感情・情動"},{"word":"avidly","meaning":"熱心に・貪欲に","etymology":"avidus（熱望する）→avid（熱心な）の副詞形。熱心に貪欲に"},{"word":"buttress","meaning":"支える・強化する・控え壁","etymology":"bouter（押す）→bout（試合）と同根。押して支える控え壁"},{"word":"ebb","meaning":"退く・衰退する・引き潮","etymology":"古英語ebban（引く）→潮が引くように退く衰退する"},{"word":"erroneous","meaning":"誤った・間違った","etymology":"errare（さまよう）→error（誤り）と同根。間違った"},{"word":"exposition","meaning":"説明・解説・博覧会","etymology":"ex＋ponere（置く）→expose（さらす）と同根。詳しく説明・展示"},{"word":"gaucherie","meaning":"不器用さ・社交的な不手際・無作法","etymology":"フランス語gauche（左・不器用）→左手のような不器用さ・社交的不手際"},{"word":"honed","meaning":"磨いた・鍛えた・研ぎ澄ましたを","etymology":"hon（砥石）→砥石で研ぎ澄ました鋭さ"},{"word":"iconoclastic","meaning":"因習打破的な・偶像破壊的な","etymology":"icon（アイコン）＋clast（壊す）→アイコンを壊す ology":"pro（前に）＋phanai（言う）→prophet（預言者）と同根"},{"word":"propitious","meaning":"好都合な・縁起のよい","etymology":"propitius（好意的な）→propitiate（なだめる）と同根。神が好意的な好都合な"},{"word":"propound","meaning":"提案する・考えを提示する・説を唱える","etymology":"pro（前に）＋ponere（置く）→propose（提案）と同根。考えを前に置く"},{"word":"propriety","meaning":"礼儀正しさ・適切さ・行儀のよさ","etymology":"proprius（自分の）→proper（適切）と同根。自分のものとしての礼儀"},{"word":"prosaic","meaning":"平凡な・散文的な・面白みのない","etymology":"prosa（散文）→prose（散文）と同根。平凡で散文的な"},{"word":"proscribed","meaning":"禁止された・追放された","etymology":"pro（前に）＋scribere（書く）→prescribe（処方）と同根。禁止リストに書く"},{"word":"prospective","meaning":"将来の・見込みの・予期される","etymology":"pro（前に）＋spicere（見る）→prospect（見通し）と同根。将来を見る"},{"word":"protract","meaning":"長引かせる・引き延ばす","etymology":"pro（前に）＋trahere（引く）→attract（引きつける）と同根。引き延ばす"},{"word":"provident","meaning":"先見の明のある・将来に備えた・節約する","etymology":"pro（前に）＋videre（見る）→provide（供給）と同根。将来を見て備える"},{"word":"proximity","meaning":"近さ・近接・近い距離","etymology":"proximus（最も近い）→approximate（近似）と同根。近さ"},{"word":"prudent","meaning":"慎重な・思慮深い・賢明な","etymology":"prudens（先を見る）→provide（供給）と同根。先を見て慎重な"},{"word":"pseudonym","meaning":"ペンネーム・仮名・偽名","etymology":"pseudo（偽の）＋onoma（名前）→偽の名前＝ペンネーム"},{"word":"puissance","meaning":"権力・力・武力","etymology":"フランス語puissance（力）→powerful（力強い）と同根。権力・武力"},{"word":"pulverize","meaning":"粉砕する・完膚なきまでに倒す","etymology":"pulvis（粉）→powder（粉）と同根。粉にする＝粉砕する"},{"word":"punctilious","meaning":"細かいことに気を使う・礼儀に厳格な","etymology":"punctum（点）→punctual（時間厳守）と同根。細かい点にこだわる"},{"word":"purportedly","meaning":"〜とされるところでは・表向きは","etymology":"purport（主張する）→purpose（目的）と同根。〜とされるところでは"},{"word":"quail","meaning":"恐怖でひるむ・縮み上がる","etymology":"quelen（苦しむ）→恐怖で縮み上がる"},{"word":"qualified","meaning":"修飾された・限定された・資格のある","etymology":"qualis（どんな種類の）＋facere（する）→quality（質）と同根。限定された資格のある"},{"word":"quiescent","meaning":"静止した・不活発な・休止中の","etymology":"quies（休息）→quiet（静か）と同根。休息して静止した"},{"word":"rakish","meaning":"しゃれた・放埒な・傾いた","etymology":"rake（道楽者）→しゃれた放埒な傾いた"},{"word":"ramification","meaning":"結果・影響・派生問題","etymology":"ramus（枝）→枝が分かれるように派生する結果・影響"},{"word":"rancor","meaning":"強い憎しみ・怨恨・積年の恨み","etymology":"rancere（腐る）→rancid（腐った）と同根。腐りゆく強い憎しみ"},{"word":"rankle","meaning":"しこりとなる・いつまでも苦しめる","etymology":"draoncle（小さな竜）→竜のように心の中で燃え続けるしこり"},{"word":"ratify","meaning":"批准する・承認する・正式に認める","etymology":"ratus（確定した）＋facere（する）→rate（比率）と同根。確定させる＝批准"},{"word":"rationalize","meaning":"合理化する・理屈をつける","etymology":"ratio（理性）→rational（合理的）と同根。理屈をつける"},{"word":"reaffirm","meaning":"再確認する・再び断言する","etymology":"re（再び）＋affirm（断言）→再び断言して確認する"},{"word":"rebut","meaning":"反論する・論駁する","etymology":"re＋bouter（押す）→butt（ぶつかる）と同根。押し返す＝反論する"},{"word":"recalcitrant","meaning":"扱いにくい・反抗的な・頑固に従わない","etymology":"re＋calx（かかと）→かかとを蹴り返す反抗的"},{"word":"recapitulate","meaning":"要約する・繰り返す・まとめる","etymology":"re＋caput（頭）→capital（主要）と同根。頭から繰り返す＝要約する"},{"word":"reckless","meaning":"無謀な・向こう見ずな・無鉄砲な","etymology":"reck（気にかける）＋less→気にかけない無謀な"},{"word":"recount","meaning":"詳しく話す・数え直す","etymology":"re（再び）＋conter（語る）→count（数える）と同根。詳しく語り直す"},{"word":"rectify","meaning":"是正する・修正する・誤りを正す","etymology":"rectus（正しい）＋facere（する）→correct（正しくする）と同根"},{"word":"recuperate","meaning":"回復する・元気を取り戻す","etymology":"re＋capere（取る）→recover（回復）と同根。再び取り戻す＝回復する"},{"word":"redoubtable","meaning":"恐るべき強さの・手ごわい・威圧的な","etymology":"re＋douter（恐れる）→doubt（疑う）と同根。恐れを引き起こす手ごわさ"},{"word":"refutes","meaning":"反論する・論駁する","etymology":"re＋futare（打ち倒す）→confute（論破）と同根。反論して打ち倒す"},{"word":"reinvent","meaning":"再発明する・一新する・作り直す","etymology":"re（再び）＋invent（発明）→作り直して一新する"},{"word":"rejuvenate","meaning":"若返らせる・活性化する・復活させる","etymology":"re＋juvenis（若い）→juvenile（若者の）と同根。若返らせる"},{"word":"relegation","meaning":"降格・左遷・追放","etymology":"re＋legare（送る）→delegate（委任）と同根。遠くに送る＝降格"},{"word":"relinquish","meaning":"放棄する・手放す・諦める","etymology":"re＋linquere（残す）→delinquent（非行の）と同根。手放して残す＝放棄する"},{"word":"remit","meaning":"送金する・免除する・委ねる","etymology":"re＋mittere（送る）→transmit（送信）と同根。送金する・免除する"},{"word":"remuneration","meaning":"報酬・給与・賃金","etymology":"re＋munus（贈り物）→munificent（気前よい）と同根。働きへの贈り物＝報酬"},{"word":"renege","meani tymology":"trichier（だます）→trick（だます）と同根。裏切りの危険な"},{"word":"treason","meaning":"反逆罪・大逆罪・裏切り","etymology":"tradere（引き渡す）→tradition（伝統）と同根。敵に引き渡す反逆罪"},{"word":"truculence","meaning":"好戦性・残忍さ・凶暴さ","etymology":"trux（残忍な）→トラックのように荒々しく突進する好戦性"},{"word":"truculent","meaning":"好戦的な・攻撃的な・凶暴な","etymology":"trux（残忍な）→truculence（好戦性）と同根。好戦的な凶暴な"},{"word":"turgid","meaning":"膨れた・誇張した・大げさな","etymology":"turgere（膨れる）→膨れ上がった誇張した文章"},{"word":"unconscionable","meaning":"良心のない・法外な・道理に反する","etymology":"un（否定）＋conscience（良心）→conscience（良心）がない法外な"},{"word":"understatement","meaning":"控えめな表現・実際より少なく言うこと","etymology":"under（下に）＋state（述べる）→実際より少なく述べる控えめな表現"},{"word":"unfettered","meaning":"束縛されていない・自由な","etymology":"un（否定）＋fetter（足枷）→足枷を外した束縛されていない"},{"word":"unguided","meaning":"指針のない・無計画な・誘導されていない","etymology":"un（否定）＋guide（導く）→指針のない無計画な"},{"word":"unmistakable","meaning":"見まがいようのない・明白な","etymology":"un（否定）＋mistake（間違える）→間違えようのない明白な"},{"word":"unobtrusive","meaning":"目立たない・控えめな・邪魔にならない","etymology":"un（否定）＋obtrude（押しつける）→押しつけがましくない目立たない"},{"word":"unqualified","meaning":"無資格の・絶対的な・資格のない","etymology":"un（否定）＋qualified（資格ある）→無資格の・絶対的な"},{"word":"unremitting","meaning":"絶え間ない・休みなく続く・容赦ない","etymology":"un（否定）＋remit（緩める）→緩めることのない絶え間ない"},{"word":"unseemly","meaning":"品のない・不適切な・見苦しい","etymology":"un（否定）＋seemly（見苦しくない）→seem（見える）と同根。見苦しい"},{"word":"unsound","meaning":"不健全な・根拠のない・欠陥のある","etymology":"un（否定）＋sound（健全な）→不健全な根拠のない"},{"word":"unsparing","meaning":"容赦のない・惜しみなく与える","etymology":"un（否定）＋spare（惜しむ）→惜しまない容赦のない"},{"word":"untenable","meaning":"支持できない・守れない・維持できない","etymology":"un＋tenable（保持できる）→tenant（テナント）が住めない＝維持できない"},{"word":"upbraid","meaning":"叱責する・非難する・とがめる","etymology":"up＋braid（編む）→縄を持ち上げて叱責する"},{"word":"utilitarian","meaning":"実用的な・見た目より機能を重視した・功利主義的な","etymology":"utilis（有用な）→utility（実用性）と同根。機能重視の実用主義"},{"word":"vacillate","meaning":"動揺する・優柔不断に迷う・ぐらつく","etymology":"vacillare（揺れる）→ワッフル（waffle）のように揺れ動く優柔不断"},{"word":"vapid","meaning":"無味乾燥な・空虚な・活気のない","etymology":"vapidus（風味がない）→vapor（蒸気）のように中身がない"},{"word":"venality","meaning":"腐敗性・金で動く体質・収賄体質","etymology":"venum（売り物）→vendor（売り手）と同根。金で動く腐敗体質"},{"word":"venerate","meaning":"崇敬する・あがめる・敬う","etymology":"venerari（崇める）→Venus（ヴィーナス）と同根。崇敬する"},{"word":"veracious","meaning":"正直な・誠実な・真実を語る","etymology":"verax（真実の）→verify（検証）と同根。真実を語る正直な"},{"word":"verdant","meaning":"緑豊かな・青々とした・未熟な","etymology":"viridis（緑の）→verde（緑）と同根。緑豊かな青々とした"},{"word":"verifiable","meaning":"検証可能な・証明できる","etymology":"verus（真実）＋facere（する）→verify（検証）と同根。検証可能な"},{"word":"verisimilitude","meaning":"真実らしさ・本物らしさ","etymology":"verus（真実）＋similis（似た）→真実に似た＝本物らしさ"},{"word":"versatile","meaning":"多才な・汎用性のある・融通がきく","etymology":"versare（回す）→verse（詩）と同根。多方向に回せる多才な"},{"word":"vestige","meaning":"痕跡・名残・わずかな証拠","etymology":"vestigium（足跡）→investigate（調査）と同根。残された足跡＝痕跡"},{"word":"viable","meaning":"実行可能な・生存可能な・現実的な","etymology":"vita（命）→vital（生命の）と同根。生き続けられる実行可能な"},{"word":"vie","meaning":"競う・張り合う・争う","etymology":"envier（競争する）→invite（誘う）と同根。競う張り合う"},{"word":"vigilant","meaning":"警戒した・油断のない・注意深い","etymology":"vigil（目覚めている）→vigil（徹夜の見張り）と同根。油断なく警戒した"},{"word":"vignette","meaning":"短い描写・小品・コマ絵","etymology":"フランス語vigne（ぶどうの木）→ぶどうの葉の装飾から短い描写・小品"},{"word":"virtuoso","meaning":"名人・巨匠・芸術的な名手","etymology":"イタリア語virtù（卓越）→virtue（美徳）と同根。芸術的名手"},{"word":"virulence","meaning":"毒性・悪意の強さ・猛毒","etymology":"virus（毒）→viral（ウイルスの）と同根。猛毒・悪意の強さ"},{"word":"visceral","meaning":"本能的な・直感的な・内臓の","etymology":"viscera（内臓）→内臓で感じる本能的な直感的な"},{"word":"vitiate","meaning":"損なう・堕落させる・無効にする","etymology":"vitium（欠陥）→vice（悪徳）と同根。欠陥を生じさせて損なう"},{"word":"vitiating","meaning":"損なう・価値を下げる・無効にする","etymology":"vitium（欠陥）→vice（悪徳）と同根。欠陥を生じさせて損なう"},{"word":"vitriol","meaning":"辛辣な批判・毒舌・硫酸","etymology":"vitrum（ガラス）→硫酸の古名から。辛辣な批判・毒舌"},{"word":"vituperate","meaning":"激しく非難する・罵倒する","etymology":"vitu（欠陥）＋parare（準備）→欠陥を激しく責め立てる"},{"word":"vocal","meaning":"声大な・声に出す・率直に意見を述べる","etymology":"vox（声）→voice（声）と同根。声に出して率直に意見を述べる"},{"word":"vociferous","meaning":"声高な・やかましく主張する","etymology":"vox（声）＋ferre（運ぶ）→vocal（声の）より激しく声高な"},{"word":"volubility","meaning":"多弁さ・流暢さ・よく喋ること","etymology":"volvere（回す）→revolve（回転）と同根。口が滑らかに回る多弁さ"},{"word":"vulgar","meaning":"下品な・俗悪な・一般大衆の","etymology":"vulgus（一般大衆）→vulgar Latin（俗ラテン語）と同根。下品な俗悪な"},{"word":"wariness","meaning":"用心深さ・警戒心","etymology":"waer（注意）→wary（用心深い）の名詞形。用心深さ"},{"word":"warring","meaning":"対立する・交戦中の","etymology":"werre（戦争）→war（戦争）と同根。対立する交戦中の"},{"word":"wary","meaning":"注意深い・用心深い・警戒する","etymology":"waer（注意）→aware（気づいた）と同根。用心深い警戒する"},{"word":"weld","meaning":"溶接する・強固に結合する","etymology":"古英語wellan（沸かす）→熱で溶かして強固に結合する"},{"word":"well-earned","meaning":"正当に得られた・当然の報酬である","etymology":"well（よく）＋earned（得た）→正当に得られた当然の報酬"},{"word":"whimsical","meaning":"気まぐれな・奇抜な・ユーモラスな","etymology":"whim（気まぐれ）→気まぐれ（whim）が多い奇抜な"},{"word":"wistful","meaning":"物思いにふけった・切ない・もの悲しい","etymology":"wist（注意深い）→wishful（望ましい）と混合。物思いにふけった切ない"},{"word":"zealot","meaning":"熱狂的信者・狂信者・過激な信奉者","etymology":"zelotes（熱心な）→zeal（熱意）が過剰な狂信者"},{"word":"zeitgeist","meaning":"時代精神・その時代の空気・時代の気分","etymology":"ドイツ語Zeit（時代）＋Geist（精神）→そのまま時代精神"}];
var wrongWords=JSON.parse(localStorage.getItem("gre_wrong")||"[]");
var stats=JSON.parse(localStorage.getItem("gre_stats")||"{}");
var qs=[],cur=0,corr=0,answered=false;
var lastPool=[];

function saveWrong(){localStorage.setItem("gre_wrong",JSON.stringify(wrongWords));}
function saveStats(){localStorage.setItem("gre_stats",JSON.stringify(stats));}

function recordResult(word,correct){
  if(!stats[word])stats[word]={attempts:0,correct:0};
  stats[word].attempts++;
  if(correct)stats[word].correct++;
  saveStats();
}

function showTab(t){
  document.querySelectorAll(".screen").forEach(function(s){s.classList.remove("active");});
  document.querySelectorAll(".nav-btn").forEach(function(b){b.classList.remove("active");});
  document.getElementById(t).classList.add("active");
  document.querySelectorAll(".nav-btn")[["home","quiz","list"].indexOf(t)].classList.add("active");
  if(t==="list")filterList();
  if(t==="home")updatePoolCount();
}

function toggleChip(el,group){
  var chips=document.getElementById(group==="status"?"status-chips":group==="acc"?"acc-chips":"count-chips").querySelectorAll(".filter-chip");
  chips.forEach(function(c){c.classList.remove("selected");});
  el.classList.add("selected");
  updatePoolCount();
}

function getSelected(groupId){
  var sel=document.querySelector("#"+groupId+" .filter-chip.selected");
  return sel?sel.getAttribute("data-"+(groupId==="status-chips"?"status":groupId==="acc-chips"?"acc":"count")):"all";
}

function buildPool(){
  var status=getSelected("status-chips");
  var acc=getSelected("acc-chips");
  var pool=V.filter(function(v){
    var s=stats[v.word];
    var attempts=s?s.attempts:0;
    var accuracy=s&&attempts>0?s.correct/s.attempts:null;
    // status filter
    if(status==="new"&&attempts>0)return false;
    if(status==="tried"&&attempts===0)return false;
    if(status==="wrong"&&wrongWords.indexOf(v.word)<0)return false;
    // accuracy filter (only applies to tried words)
    if(acc!=="all"&&attempts>0){
      if(acc==="weak"&&accuracy>=0.5)return false;
      if(acc==="mid"&&(accuracy<0.5||accuracy>=0.8))return false;
      if(acc==="good"&&accuracy<0.8)return false;
    }
    return true;
  });
  return pool;
}

function updatePoolCount(){
  var pool=buildPool();
  var count=parseInt(getSelected("count-chips")||"20");
  var actual=Math.min(pool.length,count);
  var el=document.getElementById("pool-count");
  var btn=document.getElementById("start-btn");
  if(pool.length===0){
    el.textContent="対象: 0語（条件に合う単語がありません）";
    el.style.color="#dc2626";
    btn.disabled=true;
  }else{
    el.textContent="対象: "+pool.length+"語 → "+actual+"問出題";
    el.style.color="#007aff";
    btn.disabled=false;
  }
}

function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}

function startFiltered(){
  var pool=buildPool();
  if(pool.length===0)return;
  var count=parseInt(getSelected("count-chips")||"20");
  lastPool=pool;
  launchQuiz(shuffle(pool).slice(0,count));
}

function retryMode(){
  if(lastPool.length===0)return;
  var count=parseInt(getSelected("count-chips")||"20");
  launchQuiz(shuffle(lastPool).slice(0,count));
}

function startWrongOnly(){
  var pool=V.filter(function(v){return wrongWords.indexOf(v.word)>=0;});
  if(pool.length===0){alert("間違えた単語がありません！");return;}
  lastPool=pool;
  launchQuiz(shuffle(pool).slice(0,20));
}

function launchQuiz(pool){
  qs=pool;
  cur=0;corr=0;answered=false;
  document.getElementById("result-wrap").style.display="none";
  document.getElementById("q-card").style.display="";
  document.getElementById("reveal-btn").style.display="block";
  document.getElementById("choices-wrap").style.display="none";
  showTab("quiz");
  renderQ();
}

function getChoices(q){
  var o=V.filter(function(v){return v.word!==q.word;});
  var s=shuffle(o).slice(0,3).map(function(v){return v.meaning;});
  return shuffle([q.meaning].concat(s));
}

function renderQ(){
  if(cur>=qs.length){showResult();return;}
  answered=false;
  var q=qs[cur];
  document.getElementById("word").textContent=q.word;
  document.getElementById("q-prog").textContent="問題 "+(cur+1)+" / "+qs.length;
  document.getElementById("fb").textContent="";
  document.getElementById("etym-box").style.display="none";
  document.getElementById("nxt-btn").style.display="none";
  document.getElementById("reveal-btn").style.display="block";
  document.getElementById("choices-wrap").style.display="none";
  var ch=getChoices(q);
  var c=document.getElementById("choices");
  c.innerHTML="";
  ch.forEach(function(o){
    var b=document.createElement("button");
    b.className="cb";
    b.textContent=o;
    b.setAttribute("data-val",o);
    c.appendChild(b);
  });
  c.onclick=function(e){
    var btn=e.target.closest("button");
    if(btn)pick(btn,btn.getAttribute("data-val"),q);
  };
  updateBar();
}

function revealChoices(){
  document.getElementById("reveal-btn").style.display="none";
  document.getElementById("choices-wrap").style.display="block";
}

function pick(btn,sel,q){
  if(answered)return;
  answered=true;
  document.getElementById("choices").onclick=null;
  var correct=sel===q.meaning;
  recordResult(q.word,correct);
  var allBtns=document.querySelectorAll(".cb");
  if(correct){
    btn.classList.add("ok");
    document.getElementById("fb").style.color="#065f46";
    document.getElementById("fb").textContent="正解！";
    corr++;
    wrongWords=wrongWords.filter(function(w){return w!==q.word;});
  }else{
    btn.classList.add("ng");
    document.getElementById("fb").style.color="#7f1d1d";
    document.getElementById("fb").textContent="不正解";
    allBtns.forEach(function(b){if(b.getAttribute("data-val")===q.meaning)b.classList.add("show");});
    if(wrongWords.indexOf(q.word)<0)wrongWords.push(q.word);
  }
  saveWrong();
  cur++;
  if(q.etymology){
    document.getElementById("etym-text").textContent=q.etymology;
    document.getElementById("etym-box").style.display="block";
  }
  if(correct){
    setTimeout(function(){renderQ();},1200);
  }else{
    document.getElementById("nxt-btn").style.display="block";
  }
  updateBar();
}

function nextQ(){renderQ();}

function updateBar(){
  var done=cur;
  var pct=done>0?Math.round(corr/done*100):0;
  document.getElementById("bar").style.width=pct+"%";
  document.getElementById("sc-lbl").textContent="正解 "+corr+" / "+done;
}

function showResult(){
  document.getElementById("q-card").style.display="none";
  document.getElementById("reveal-btn").style.display="none";
  document.getElementById("choices-wrap").style.display="none";
  var p=Math.round(corr/qs.length*100);
  document.getElementById("r-emoji").textContent=p>=80?"🎉":p>=60?"👍":"💪";
  document.getElementById("r-title").textContent=p>=80?"素晴らしい！":p>=60?"よくできました！":"もう少し！";
  document.getElementById("r-sub").textContent=qs.length+"問中 "+corr+"問正解 ("+p+"%)";
  document.getElementById("r-wrong-btn").style.display=wrongWords.length>0?"block":"none";
  document.getElementById("result-wrap").style.display="block";
}

function getBadge(word){
  var s=stats[word];
  if(!s||s.attempts===0)return {text:"未挑戦",cls:"b-new"};
  var acc=Math.round(s.correct/s.attempts*100);
  var label=s.attempts+"回 "+acc+"%";
  if(acc>=80)return {text:label,cls:"b-ok"};
  if(acc>=50)return {text:label,cls:"b-mid"};
  return {text:label,cls:"b-hot"};
}

function filterList(){
  var q=document.getElementById("search").value.toLowerCase();
  var sort=document.getElementById("sort-select").value;
  var list=q?VS.filter(function(v){return v.word.toLowerCase().indexOf(q)>=0||v.meaning.indexOf(q)>=0;}):VS.slice();
  if(sort==="attempts_desc"){
    list.sort(function(a,b){
      var sa=stats[a.word]||{attempts:0};var sb=stats[b.word]||{attempts:0};
      return sb.attempts-sa.attempts;
    });
  }else if(sort==="accuracy_asc"){
    list.sort(function(a,b){
      var sa=stats[a.word];var sb=stats[b.word];
      var aa=sa&&sa.attempts>0?sa.correct/sa.attempts:1;
      var ba=sb&&sb.attempts>0?sb.correct/sb.attempts:1;
      return aa-ba;
    });
  }else if(sort==="accuracy_desc"){
    list.sort(function(a,b){
      var sa=stats[a.word];var sb=stats[b.word];
      var aa=sa&&sa.attempts>0?sa.correct/sa.attempts:-1;
      var ba=sb&&sb.attempts>0?sb.correct/sb.attempts:-1;
      return ba-aa;
    });
  }else if(sort==="score_asc"){
    list.sort(function(a,b){
      var sa=stats[a.word];var sb=stats[b.word];
      var as2=sa&&sa.attempts>0?(sa.correct/sa.attempts)*sa.attempts:999;
      var bs2=sb&&sb.attempts>0?(sb.correct/sb.attempts)*sb.attempts:999;
      return as2-bs2;
    });
  }
  var container=document.getElementById("word-list");
  container.innerHTML="";
  list.forEach(function(v){
    var badge=getBadge(v.word);
    var div=document.createElement("div");
    div.className="wi";
    div.onclick=function(){this.classList.toggle("open");};
    var sp=document.createElement("span");
    sp.className="wb "+badge.cls;
    sp.textContent=badge.text;
    div.appendChild(sp);
    var dw=document.createElement("div");
    dw.className="ww";dw.textContent=v.word;
    div.appendChild(dw);
    var dm=document.createElement("div");
    dm.className="wm";dm.textContent=v.meaning;
    div.appendChild(dm);
    var de=document.createElement("div");
    de.className="we";de.textContent=v.etymology||"語源データなし";
    div.appendChild(de);
    container.appendChild(div);
  });
}

updatePoolCount();
</script>
